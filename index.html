<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库管理系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .panel{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:40px;width:100%;max-width:480px;text-align:center}
        .panel.wide{max-width:1000px}
        .panel h1{color:#333;margin-bottom:10px;font-size:28px}
        .subtitle{color:#999;margin-bottom:30px;font-size:14px}
        .fg{margin-bottom:20px;text-align:left}
        .fg label{display:block;margin-bottom:8px;color:#555;font-weight:500;font-size:14px}
        .fg select,.fg input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;transition:.3s}
        .fg select:focus,.fg input:focus{outline:none;border-color:#667eea}
        .btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:.3s}
        .btn-p{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
        .btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(102,126,234,.4)}
        .btn-g{background:#52c41a;color:#fff;margin-top:15px}
        .btn-r{background:#ff4d4f;color:#fff}
        .btn-s{background:#8c8c8c;color:#fff;margin-top:10px}
        .btn-xs{padding:6px 12px;font-size:13px;border:none;border-radius:4px;cursor:pointer}
        .msg{margin-top:15px;font-size:14px;min-height:20px}
        .err{color:#ff4d4f}.ok{color:#52c41a}
        .hidden{display:none!important}
        .sec{margin-bottom:35px;padding:25px;background:#f8f9fa;border-radius:12px}
        .sec h3{color:#333;margin-bottom:20px;font-size:18px}
        .sec h3::before{content:'';display:inline-block;width:4px;height:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:2px;margin-right:10px;vertical-align:middle}
        .key-item{padding:15px;background:#fff;border-radius:8px;margin-bottom:10px;border:1px solid #e0e0e0;display:flex;flex-direction:column;gap:10px}
        .key-val{font-family:'Consolas',monospace;font-size:16px;color:#667eea;font-weight:600;margin-bottom:5px;word-break:break-all}
        .key-meta{font-size:12px;color:#999}
        .key-acts{display:flex;gap:10px;justify-content:flex-end}
        .toast{position:fixed;top:20px;right:20px;padding:15px 25px;border-radius:8px;color:#fff;z-index:10001;animation:slideR .3s;font-weight:500}
        .toast.ok{background:#52c41a}.toast.err{background:#ff4d4f}
        @keyframes slideR{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
        .q{margin-bottom:25px;padding:20px;background:#f8f9fa;border-radius:10px;border:1px solid #e0e0e0}
        .qn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border-radius:50%;margin-right:10px;font-size:14px}
        .qt{font-size:16px;color:#333;line-height:1.7;margin-bottom:15px}
        .ops{margin-left:38px}
        .op{padding:10px 15px;margin-bottom:8px;background:#fff;border-radius:6px;border:1px solid #e0e0e0}
        .ol{font-weight:600;color:#667eea;margin-right:8px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:10000;justify-content:center;align-items:center}
        .modal.active{display:flex}
        .modal-box{background:#fff;padding:40px;border-radius:16px;width:90%;max-width:400px;text-align:center;animation:slideIn .3s}
        @keyframes slideIn{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
        .eh{border-bottom:2px solid #f0f0f0;padding-bottom:20px;margin-bottom:25px;display:flex;justify-content:space-between;align-items:center}
        .eh h2{color:#333;font-size:22px}
        .xbtn{padding:8px 20px;background:#f0f0f0;border:none;border-radius:6px;cursor:pointer;color:#666;font-size:14px}
        .xbtn:hover{background:#e0e0e0;color:#333}
        .cbank{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:15px 20px;border-radius:8px;margin-bottom:20px;text-align:left}
        .cbank strong{font-size:16px}
        .spin{display:inline-block;width:20px;height:20px;border:3px solid #f0f0f0;border-top-color:#667eea;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .bcheck{display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 14px;background:#fff;border:2px solid #e0e0e0;border-radius:6px;font-size:14px;color:#555;transition:.2s;user-select:none}
        .bcheck input{display:none}
        .bcheck.sel{border-color:#667eea;background:#f0f2ff;color:#667eea;font-weight:500}
        .btile{display:inline-block;padding:3px 10px;background:rgba(102,126,234,.15);color:#667eea;border-radius:4px;font-size:12px;margin:2px 4px;white-space:nowrap}
        body{align-items:flex-start;padding:36px 18px;background:linear-gradient(135deg,#eef2ff 0%,#f5f3ff 45%,#fff 100%);color:#1f2937}
        .panel{border:1px solid rgba(102,126,234,.12);box-shadow:0 24px 70px rgba(31,41,55,.12);border-radius:22px;padding:34px;text-align:left}
        .panel:not(.wide){text-align:center;margin-top:9vh}
        .panel.wide{max-width:1080px;margin:0 auto}
        .panel h1,.panel h2{letter-spacing:.5px}
        .subtitle{text-align:center;color:#7b8190}
        .fg{margin-bottom:18px}
        .fg label{color:#374151;font-weight:700}
        .fg input,.fg select{height:46px;border:1px solid #d9def0;border-radius:12px;background:#fbfcff;color:#111827}
        .fg input:focus,.fg select:focus{border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,.12)}
        .btn,.xbtn,.btn-xs{border-radius:12px;box-shadow:none}
        .btn:hover,.xbtn:hover,.btn-xs:hover{transform:translateY(-1px)}
        .eh{background:#f8faff;border:1px solid #edf0f7;border-radius:16px;padding:18px 20px;margin-bottom:22px}
        .eh h1,.eh h2{margin:0;color:#27324a}
        .sec{border:1px solid #edf0f7;background:#fbfcff;border-radius:18px;padding:24px;margin-bottom:22px}
        .sec h3{display:flex;align-items:center;margin-bottom:18px}
        .key-item{border:1px solid #edf0f7;border-radius:14px;padding:16px 18px;background:#fff;box-shadow:0 8px 24px rgba(31,41,55,.04)}
        .key-acts{padding-top:4px;border-top:1px dashed #edf0f7}
        .cbank{border-radius:16px;padding:16px 18px;box-shadow:0 10px 26px rgba(102,126,234,.18)}
        #bank-checks{display:grid!important;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px!important}
        .bcheck{justify-content:center;min-height:44px;border-radius:12px;border:1px solid #d9def0;background:#fff}
        .bcheck.sel{box-shadow:0 0 0 4px rgba(102,126,234,.1)}
        .bdd{position:relative}
        .bdd-tg{width:100%;min-height:46px;border:1px solid #d9def0;border-radius:12px;background:#fbfcff;padding:8px 40px 8px 14px;cursor:pointer;display:flex;align-items:center;flex-wrap:wrap;gap:6px;color:#9aa3b2;font-size:15px;position:relative;transition:.2s}
        .bdd-tg:hover,.bdd.open .bdd-tg{border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,.12)}
        .bdd-tg::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#667eea;font-size:14px;transition:.2s}
        .bdd.open .bdd-tg::after{transform:translateY(-50%) rotate(180deg)}
        .bdd-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(102,126,234,.12);color:#667eea;padding:3px 8px 3px 10px;border-radius:6px;font-size:13px;font-weight:500}
        .bdd-tag span{cursor:pointer;color:#8c94a8;font-weight:700;line-height:1}
        .bdd-tag span:hover{color:#ff4d4f}
        .bdd-pn{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid #d9def0;border-radius:12px;box-shadow:0 12px 30px rgba(31,41,55,.15);padding:6px;z-index:20;max-height:240px;overflow-y:auto;display:none}
        .bdd.open .bdd-pn{display:block}
        .bdd-it{padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;color:#374151;transition:.15s}
        .bdd-it:hover{background:#f3f4ff}
        .bdd-it.sel{background:#eef0ff;color:#667eea;font-weight:600}
        .bdd-it::before{content:'';width:16px;height:16px;border:1.5px solid #cbd5e1;border-radius:4px;flex-shrink:0;display:inline-block;transition:.15s}
        .bdd-it.sel::before{background:#667eea;border-color:#667eea;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M3.5 8l3 3 6-6' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-size:cover}
        .bid-badge{position:fixed;top:14px;right:14px;z-index:99999;background:rgba(255,255,255,.96);border:1px solid rgba(102,126,234,.3);border-radius:999px;padding:8px 14px;font-size:13px;color:#374151;box-shadow:0 8px 24px rgba(31,41,55,.15);display:flex;align-items:center;gap:8px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;backdrop-filter:blur(6px);cursor:pointer;transition:.2s;user-select:none;pointer-events:auto}
        .bid-badge:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(31,41,55,.18)}
        .bid-badge .bid-dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);box-shadow:0 0 0 3px rgba(102,126,234,.15)}
        .bid-badge .bid-lb{color:#9aa3b2;font-size:12px}
        .bid-badge .bid-val{font-family:'Consolas','SF Mono',monospace;font-weight:600;color:#667eea;letter-spacing:.5px}
        #klist{display:grid;gap:12px}
        #exam-q>div,#pq>div{box-shadow:0 8px 24px rgba(31,41,55,.04)}
        #exam-o>div,#po>div{box-shadow:0 6px 18px rgba(31,41,55,.04);transition:.2s}
        #exam-a,#pa{border:1px solid transparent;box-shadow:0 8px 24px rgba(31,41,55,.05)}
        #exam-bank-list>div{box-shadow:0 12px 28px rgba(102,126,234,.18)}
        .modal{backdrop-filter:blur(4px)}
        .modal-box{border-radius:20px;box-shadow:0 24px 70px rgba(0,0,0,.24)}
        @media (max-width:640px){body{padding:16px 10px}.panel{padding:22px;border-radius:18px}.eh{flex-direction:column;gap:12px;align-items:stretch;text-align:center}.key-acts{justify-content:stretch}.key-acts button{flex:1}#exam-bank-list{flex-direction:column!important}.panel:not(.wide){margin-top:4vh}}
    </style>
</head>
<body>
<div class="bid-badge" id="bid-badge" title="点击复制浏览器ID" onclick="copyBrowserId()"><span class="bid-dot"></span><span class="bid-lb">浏览器ID</span><span class="bid-val" id="bid-val">-</span></div>
<div class="panel" id="user-panel">
    <h1>题库解锁</h1>
    <p class="subtitle">请输入密钥查看试题内容</p>
    <div class="fg">
        <label>输入密钥</label>
        <input type="text" id="user-key" placeholder="请输入您的专属密钥" autocomplete="off">
    </div>
    <button class="btn btn-p" onclick="unlock()">解锁题库</button>
    <p class="msg err" id="user-err"></p>
    <div id="auto-msg" style="display:none;margin-top:15px;padding:12px;background:#f6ffed;border:1px solid #b7eb8f;border-radius:8px;color:#52c41a;font-size:13px;">
        <span class="spin"></span>检测登录状态...
    </div>
</div>

<div class="panel wide hidden" id="exam-panel">
    <div class="eh"><h2>试题内容</h2><button class="xbtn" onclick="logout()">退出</button></div>
    <div class="cbank"><strong>当前题库：</strong><span id="bank-name"></span></div>
    <div id="exam-bank-chooser" style="display:none;text-align:center;padding:40px 20px;">
        <h3 style="color:#333;margin-bottom:20px;">请选择要查看的试题库</h3>
        <div id="exam-bank-list" style="display:flex;flex-wrap:wrap;gap:15px;justify-content:center;"></div>
    </div>
    <div style="margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:#666;font-size:14px;">答题进度</span><span id="exam-ptxt" style="color:#667eea;font-weight:600;">0/0</span></div>
        <div style="height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;"><div id="exam-pbar" style="height:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);width:0%;transition:width .3s;"></div></div>
    </div>
    <div id="exam-qarea">
        <div id="exam-q"></div>
        <div id="exam-o" style="margin:20px 0;"></div>
        <div id="exam-a" style="display:none;padding:20px;border-radius:12px;margin-bottom:20px;"></div>
        <div id="exam-nav" style="display:none;text-align:center;margin-top:20px;"></div>
    </div>
    <div id="exam-res" style="display:none;text-align:center;padding:40px 20px;"></div>
</div>

<div class="panel wide hidden" id="admin-panel">
    <div class="eh"><h1 style="color:#667eea;font-size:26px;">管理员后台</h1><span style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;">管理员模式</span></div>
    <div class="sec">
        <h3>用户密钥管理</h3>
        <div class="fg"><label>自定义密钥（留空自动生成）</label><input type="text" id="ckey" placeholder="留空自动生成8位随机密钥"></div>
        <div class="fg"><label>绑定浏览器ID <span style="color:#ff4d4f;">*</span></label><input type="text" id="cbid" placeholder="请输入用户浏览器ID（让用户从其浏览器左上角复制）" style="font-family:'Consolas',monospace;letter-spacing:.5px;text-transform:uppercase;"></div>
        <div class="fg"><label>备注（可选）</label><input type="text" id="kremark" placeholder="如：张三的密钥"></div>
        <div class="fg"><label>绑定试题库（可多选）</label><div id="bank-dd" class="bdd"><div class="bdd-tg" id="bank-dd-tg" onclick="event.stopPropagation();toggleBankDD()"><span id="bank-dd-ph">请选择试题库</span></div><div class="bdd-pn" id="bank-dd-pn"></div></div></div>
        <button class="btn btn-g" onclick="genKey()">生成密钥</button>
        <div style="margin-top:30px;"><h4 style="margin-bottom:15px;color:#555;">已生成密钥列表</h4><div id="klist"><p style="color:#999;text-align:center;padding:20px;">暂无密钥</p></div></div>
    </div>
    <div class="sec" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;text-align:center;">
        <h3 style="color:#fff;">题库练习</h3><p style="margin-bottom:20px;opacity:.9;">管理员可在此进行题库练习和测试</p>
        <button class="btn" onclick="enterPractice()" style="background:#fff;color:#667eea;max-width:200px;margin:0 auto;">进入刷题模式</button>
    </div>
    <button class="btn btn-r" onclick="adminLogout()" style="margin-top:20px;">退出管理后台</button>
</div>

<div class="panel wide hidden" id="practice-page">
    <div class="eh"><h2 style="color:#667eea;font-size:24px;">题库练习</h2><button class="xbtn" onclick="exitPractice()">返回后台</button></div>
    <div id="psel" style="text-align:center;padding:40px 20px;">
        <h3 style="color:#333;margin-bottom:20px;">选择题库开始练习</h3>
        <select id="pbank" style="width:100%;max-width:400px;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;margin-bottom:20px;"><option value="">-- 请选择题库 --</option></select>
        <button class="btn btn-p" onclick="startPractice()" style="max-width:400px;">开始练习</button>
    </div>
    <div id="parea" style="display:none;">
        <div style="margin-bottom:20px;"><div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:#666;font-size:14px;">答题进度</span><span id="ptxt" style="color:#667eea;font-weight:600;">1/10</span></div><div style="height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;"><div id="pbar" style="height:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);width:10%;transition:width .3s;"></div></div></div>
        <div id="pq"></div>
        <div id="po" style="margin:20px 0;"></div>
        <div id="pa" style="display:none;padding:20px;border-radius:12px;margin-bottom:20px;"><div id="pat" style="font-weight:600;font-size:18px;margin-bottom:10px;"></div><div id="pac" style="line-height:1.6;"></div></div>
    </div>
    <div id="pres" style="display:none;text-align:center;padding:40px 20px;">
        <div id="rem" style="font-size:80px;margin-bottom:20px;"></div><div id="rsc" style="font-size:48px;font-weight:700;margin-bottom:15px;"></div><div id="rdt" style="color:#666;font-size:16px;margin-bottom:30px;"></div>
        <div style="display:flex;gap:15px;justify-content:center;">
            <button class="btn btn-p" onclick="restartPractice()" style="max-width:200px">重新练习</button>
            <button class="btn btn-s" onclick="changeBank()" style="max-width:200px">切换题库</button>
        </div>
    </div>
</div>

<div class="modal" id="edit-modal"><div class="modal-box"><h3 style="margin-bottom:20px;color:#333;">编辑密钥</h3><input type="hidden" id="ekey"><div class="fg"><label>备注</label><input type="text" id="eremark" placeholder="输入备注"></div><div style="display:flex;gap:10px;"><button class="btn btn-s" onclick="document.getElementById('edit-modal').classList.remove('active')">取消</button><button class="btn btn-p" onclick="saveEdit()">保存</button></div></div></div>

<div class="modal" id="login-modal"><div class="modal-box"><h2>管理员验证</h2><p style="color:#999;margin-bottom:25px;font-size:14px;">请输入管理员密码</p><div class="fg" style="text-align:left;"><label>管理员密码</label><input type="password" id="apwd" placeholder="请输入密码" onkeypress="if(event.key==='Enter')checkPwd()"></div><button class="btn btn-p" onclick="checkPwd()">验证进入</button><button class="btn btn-s" onclick="document.getElementById('login-modal').classList.remove('active')">取消</button><p class="msg err" id="aerr"></p></div></div>

<script>
const ADM='HM78Z';
const API='/api';

// ===== 题库数据 =====
const BANKS={
    default:{name:'示例题库',questions:[
        {question:'以下哪个是HTML5的新特性？',options:['<canvas>','<div>','<span>','<table>'],answer:0},
        {question:'CSS中哪个属性用于设置背景颜色？',options:['color','background-color','font-color','border-color'],answer:1},
        {question:'JavaScript中声明变量用什么关键字？',options:['var','variable','int','string'],answer:0},
        {question:'以下哪种不是CSS选择器？',options:['类选择器','ID选择器','标签选择器','文本选择器'],answer:3,analysis:'CSS中没有"文本选择器"这个概念。常见的选择器包括类选择器、ID选择器、标签选择器、属性选择器等。'}
    ]},
    db_final:{name:'数据库期末复习',questions:[
        {question:'当要查询的条件是某几个特定的不连续的数值时,可以用关键字( )?',options:['IN','BETWEEN AND','ON','OF'],answer:0,analysis:'IN关键字用于匹配多个不连续的指定值；BETWEEN AND用于连续数值区间，ON用于多表连接条件，OF无此查询匹配用法。'},
        {question:'下列实体类型的联系中，属于一对一（1:1）联系的是（）。',options:['供应商与工程项目的供货联系','省对省会的所属联系','父亲对孩子的所属联系','教研室对教师的所属联系'],answer:1,analysis:'一个省仅有一个省会，一个省会仅归属一个省，属于一对一联系；供应商与工程是多对多，父亲与孩子、教研室与教师是一对多。'},
        {question:'已知成绩关系如下表所示,执行SQL语句:SELECT COUNT(DISTINCT 学号) FROM成绩 WHERE 分数>60;\n成绩表\n学号 | 课程号 | 分数\nS1 | C1 | 80\nS1 | C2 | 65\nS1 | C3 | 50\nS2 | C1 | NULL\nS2 | C2 | 55\nS3 | C3 | 95\n查询结果中包含的元组数目是()。',options:['4','1','3','2'],answer:3,analysis:'筛选分数大于60的记录：S1(80、65)、S3(95)；DISTINCT对学号去重后只剩S1、S3两个学号，统计结果元组数目为2。'},
        {question:'SQL中,"DELETE FROM 表名"表示( )?',options:['从数据库中删除这个基本表','从基本表中删除所有元组','从基本表中删除所有属性','从基本表中删除重复元组'],answer:1,analysis:'DELETE语句作用是删除表内的数据（元组），无WHERE条件时会清空整张表全部数据；DROP TABLE才是删除数据表结构。'},

function fp(){let s=[navigator.userAgent,navigator.language,screen.colorDepth,screen.width+'x'+screen.height,new Date().getTimezoneOffset()].join('|');let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h=h&h;}return'fp_'+Math.abs(h).toString(16)}
function t(m,e){let d=document.createElement('div');d.className='toast '+(e?'err':'ok');d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),3000)}
function esc(s){let d=document.createElement('div');d.textContent=s;return d.innerHTML}
function renderQText(s){
    let lines=String(s).split('\n'),out='',i=0;
    while(i<lines.length){
        if(lines[i].indexOf('|')!==-1&&i+1<lines.length&&lines[i+1].indexOf('|')!==-1){
            let rows=[];while(i<lines.length&&lines[i].indexOf('|')!==-1){rows.push(lines[i].split('|').map(c=>c.trim()));i++}
            out+='<table style="border-collapse:collapse;margin:8px 0;font-size:15px;">';
            rows.forEach((r,ri)=>{let tag=ri===0?'th':'td',bg=ri===0?'background:#eef2ff;':'';out+='<tr>'+r.map(c=>`<${tag} style="border:1px solid #cbd5e1;padding:6px 12px;text-align:left;${bg}">${esc(c)}</${tag}>`).join('')+'</tr>'});
            out+='</table>';
        }else{out+=esc(lines[i])+'\n';i++}
    }
    return out.replace(/\n$/,'');
}
function shuffle(a){let r=a.slice();for(let i=r.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function shuffleBank(questions){
    return shuffle(questions).map(q=>{
        let idx=q.options.map((_,i)=>i),shuf=shuffle(idx);
        return {question:q.question,options:shuf.map(i=>q.options[i]),answer:shuf.indexOf(q.answer),analysis:q.analysis};
    });
}

function getKeys(){try{return JSON.parse(localStorage.getItem('qbank_keys')||'[]')}catch(e){return[]}}
function saveKeys(ks){localStorage.setItem('qbank_keys',JSON.stringify(ks))}

async function genKey(){
    let ck=document.getElementById('ckey').value.trim();
    let bidRaw=document.getElementById('cbid').value;
    let bid=String(bidRaw||'').replace(/\s+/g,'').toUpperCase();
    let rm=document.getElementById('kremark').value.trim();
    let bids=[];
    document.querySelectorAll('#bank-dd-pn .bdd-it.sel').forEach(el=>bids.push(el.dataset.id));
    if(!bid){t('请输入要绑定的浏览器ID',true);document.getElementById('cbid').focus();return}
    if(!/^[A-Z0-9_]{3,64}$/.test(bid)){t('浏览器ID格式不合法（仅允许字母、数字、下划线，3-64位）：'+bid,true);return}
    if(bids.length===0){t('请至少绑定一个试题库',true);return}
    let ks=getKeys();
    if(ks.some(k=>k.browserId===bid)){t('该浏览器ID已绑定其他密钥',true);return}
    let bankId=bids.join(',');
    try{
        let r=await fetch(API+'/generate-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bankId:bankId,customKey:ck||null,adminToken:ADM,remark:rm,browserId:bid})});
        let d=await r.json();
        if(d.success){
            ks.push({key:d.key,remark:rm||'',banks:bids,browserId:d.browserId||bid,createdAt:new Date().toLocaleString()});
            saveKeys(ks);
            document.getElementById('ckey').value='';document.getElementById('cbid').value='';document.getElementById('kremark').value='';
            document.querySelectorAll('#bank-dd-pn .bdd-it.sel').forEach(el=>el.classList.remove('sel'));
            renderBankDD();
            renderKeys();t('密钥生成成功');
        }else{t(d.error,true)}
    }catch(e){t('生成失败，请检查网络',true)}
}

function renderKeys(){
    let ks=getKeys(),c=document.getElementById('klist');
    if(ks.length===0){c.innerHTML='<p style="color:#999;text-align:center;padding:20px;">暂无密钥</p>';return}
    let h='';
    ks.forEach((k,i)=>{
        let rm=k.remark?`<span style="color:#667eea;font-weight:500;">[${k.remark}]</span> `:'';
        let shortKey=k.key.split('.')[0] || k.key;
        let btags='';
        if(k.banks&&k.banks.length){k.banks.forEach(bid=>{let bn=BANKS[bid];if(bn)btags+=`<span class="btile">${esc(bn.name)}</span>`})}
        h+=`<div class="key-item">
            <div>
                <div class="key-val" style="cursor:pointer" title="点击复制完整密钥" onclick="copyKey('${k.key.replace(/'/g,"\\'")}')">${rm}${shortKey} <span style="font-size:11px;color:#999;">📋复制</span></div>
                ${btags?`<div style="margin-top:6px;">${btags}</div>`:''}
                <div class="key-meta">创建: ${k.createdAt}</div>
            </div>
            <div class="key-acts">
                <button class="btn-xs" style="background:#667eea;color:#fff;" onclick="editKey(${i})">编辑</button>
                <button class="btn-xs btn-r" onclick="delKey(${i})">删除</button>
            </div></div>`;
    });
    c.innerHTML=h;
}

function editKey(i){
    let ks=getKeys();
    document.getElementById('ekey').value=i;
    document.getElementById('eremark').value=ks[i].remark||'';
    document.getElementById('edit-modal').classList.add('active');
}
function saveEdit(){
    let i=parseInt(document.getElementById('ekey').value);
    let rm=document.getElementById('eremark').value.trim();
    let ks=getKeys();ks[i].remark=rm;saveKeys(ks);
    document.getElementById('edit-modal').classList.remove('active');
    renderKeys();t('密钥已更新');
}
function copyKey(key){
    navigator.clipboard.writeText(key).then(()=>t('密钥已复制到剪贴板！')).catch(()=>{
        let ta=document.createElement('textarea');ta.value=key;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);t('密钥已复制！');
    });
}
function delKey(i){
    if(!confirm('确定删除此密钥？删除后该密钥将无法再次使用。'))return;
    let ks=getKeys(),rec=ks[i];
    if(rec&&rec.key){
        let rev=JSON.parse(localStorage.getItem('qbank_revoked')||'[]');
        let rawKey=rec.key.split('.')[0];
        if(rev.indexOf(rawKey)===-1)rev.push(rawKey);
        localStorage.setItem('qbank_revoked',JSON.stringify(rev));
        if(rec.browserId){
            let bidRev=JSON.parse(localStorage.getItem('qbank_revoked_bid')||'{}');
            bidRev[rec.browserId]=(bidRev[rec.browserId]||[]).concat([rawKey]);
            localStorage.setItem('qbank_revoked_bid',JSON.stringify(bidRev));
        }
    }
    ks.splice(i,1);saveKeys(ks);renderKeys();t('密钥已删除并加入撤销列表');
}

function isRevoked(key){
    let rev=JSON.parse(localStorage.getItem('qbank_revoked')||'[]');
    let raw=String(key||'').split('.')[0];
    return rev.indexOf(raw)!==-1;
}

// ===== 用户解锁 =====
async function unlock(){
    let k=document.getElementById('user-key').value.trim();
    let e=document.getElementById('user-err');e.textContent='';
    if(!k){e.textContent='请输入密钥';return}
    if(isRevoked(k)){e.textContent='此密钥已被管理员撤销';return}
    let curBid=(localStorage.getItem('browser_id')||'').toUpperCase();
    if(!curBid){e.textContent='浏览器ID未初始化，请刷新页面';return}
    try{
        let r=await fetch(API+'/verify-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k,browserId:curBid})});
        let d=await r.json();
        if(d.verified){
            localStorage.setItem('qbank_bind','1');
            localStorage.setItem('qbank_key',k);
            localStorage.setItem('qbank_banks',d.bankId||'');
            localStorage.setItem('qbank_bid',d.browserId||curBid);
            showExam(d.bankId);
        }else{e.textContent=d.error||'密钥无效'}
    }catch(e){e.textContent='网络错误'}
}

        document.getElementById('exam-qarea').style.display='none';

function selectExamBank(bid){
    let allowed=(localStorage.getItem('qbank_banks')||'').split(',').filter(Boolean);
    if(allowed.length&&allowed.indexOf(bid)===-1){t('该试题库未授权访问',true);return}
    if(!BANKS[bid]){t('试题库不存在',true);return}
    document.getElementById('exam-bank-chooser').style.display='none';
    document.getElementById('exam-qarea').style.display='block';
    let bank=BANKS[bid];
    document.getElementById('bank-name').textContent=bank.name;
    let qs=shuffleBank(bank.questions);
    es={bankId:bid,questions:qs,currentIndex:0,answers:new Array(qs.length).fill(null),correctCount:0};
    document.getElementById('exam-res').style.display='none';
    showExamQ();
}

// ===== 自动登录 =====
async function checkSession(){
    let bound=localStorage.getItem('qbank_bind');
    if(!bound)return;
    let k=localStorage.getItem('qbank_key');
    if(!k)return;
    let curBid=(localStorage.getItem('browser_id')||'').toUpperCase();
    let savedBid=(localStorage.getItem('qbank_bid')||'').toUpperCase();
    if(isRevoked(k)){
        clearSession();
        document.getElementById('user-err').textContent='此密钥已被管理员撤销';
        return;
    }
    if(savedBid&&savedBid!==curBid){
        clearSession();
        document.getElementById('user-err').textContent='检测到设备变更，请重新输入密钥';
        return;
    }
    try{
        let r=await fetch(API+'/verify-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k,browserId:curBid})});
        let d=await r.json();
        if(d.verified){showExam(d.bankId);t('欢迎回来！已自动登录')}
        else{
            clearSession();
            document.getElementById('user-err').textContent=d.error||'会话已过期，请重新输入密钥';
        }
    }catch(e){}
}
function clearSession(){
    localStorage.removeItem('qbank_bind');
    localStorage.removeItem('qbank_key');
    localStorage.removeItem('qbank_fp');
    localStorage.removeItem('qbank_banks');
    localStorage.removeItem('qbank_bid');
}

// ===== 刷题功能 =====
let ps={bankId:null,questions:[],currentIndex:0,answers:[],correctCount:0};
let es={bankId:null,questions:[],currentIndex:0,answers:[],correctCount:0};

function enterPractice(){
    document.getElementById('admin-panel').classList.add('hidden');
    document.getElementById('practice-page').classList.remove('hidden');
    let s=document.getElementById('pbank');s.innerHTML='<option value="">-- 请选择题库 --</option>';
    Object.entries(BANKS).forEach(([id,b])=>{s.innerHTML+=`<option value="${id}">${b.name}</option>`});
    resetUI();
}
function exitPractice(){document.getElementById('practice-page').classList.add('hidden');document.getElementById('admin-panel').classList.remove('hidden')}
function resetUI(){document.getElementById('psel').style.display='block';document.getElementById('parea').style.display='none';document.getElementById('pres').style.display='none'}

function startPractice(){
    let id=document.getElementById('pbank').value;
    if(!id){t('请选择题库',true);return}
    let bank=BANKS[id];
    if(!bank||!bank.questions||bank.questions.length===0){t('题库无题目',true);return}
    let qs=shuffleBank(bank.questions);
    ps={bankId:id,questions:qs,currentIndex:0,answers:new Array(qs.length).fill(null),correctCount:0};
    document.getElementById('psel').style.display='none';document.getElementById('parea').style.display='block';showQ();
}

function showQ(){
    let q=ps.questions[ps.currentIndex],cur=ps.currentIndex+1,total=ps.questions.length;
    document.getElementById('ptxt').textContent=`${cur}/${total}`;
    document.getElementById('pbar').style.width=`${(cur/total)*100}%`;
    let nav='';
    if(ps.currentIndex>0)nav=`<div style="margin-bottom:15px;"><button onclick="prevQ()" style="padding:10px 20px;background:#f0f0f0;border:none;border-radius:8px;cursor:pointer;color:#666;font-weight:500;">← 上一题</button></div>`;
    document.getElementById('pq').innerHTML=nav+`<div style="padding:25px;background:#f8f9fa;border-radius:12px;border:1px solid #e0e0e0;"><div style="font-weight:600;color:#333;font-size:18px;line-height:1.6;white-space:pre-wrap;word-break:break-word;"><span class="qn" style="width:32px;height:32px;font-size:16px;">${cur}</span>${renderQText(q.question)}</div></div>`;
    let o='',lbs=['A','B','C','D','E','F'];
    q.options.forEach((opt,i)=>{o+=`<div class="oi" onclick="sel(${i})" style="display:flex;align-items:center;padding:15px 20px;margin-bottom:12px;background:#fff;border-radius:10px;cursor:pointer;border:2px solid #e0e0e0;" onmouseover="this.style.borderColor='#667eea'" onmouseout="this.style.borderColor='#e0e0e0'"><span style="font-weight:600;color:#667eea;margin-right:12px;font-size:16px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:#f0f2ff;border-radius:50%;">${lbs[i]}</span><span style="color:#333;font-size:16px;flex:1;">${esc(opt)}</span></div>`});
    document.getElementById('po').innerHTML=o;
    document.getElementById('pa').style.display='none';
}

function sel(idx){
    let q=ps.questions[ps.currentIndex],ok=idx===q.answer;
    ps.answers[ps.currentIndex]=idx;if(ok)ps.correctCount++;
    let os=document.querySelectorAll('.oi'),lbs=['A','B','C','D','E','F'];
    os.forEach((o,i)=>{o.style.pointerEvents='none';if(i===q.answer){o.style.borderColor='#52c41a';o.style.background='#f6ffed';o.innerHTML+=`<span style="color:#52c41a;font-weight:600;margin-left:10px;">✓ 正确</span>`}else if(i===idx&&!ok){o.style.borderColor='#ff4d4f';o.style.background='#fff2f0';o.innerHTML+=`<span style="color:#ff4d4f;font-weight:600;margin-left:10px;">✗ 错误</span>`}else o.style.opacity='0.6'});
    let ad=document.getElementById('pa'),at=document.getElementById('pat'),ac=document.getElementById('pac');
    if(ok){ad.style.background='#f6ffed';ad.style.borderColor='#52c41a';at.textContent='🎉 回答正确！';at.style.color='#52c41a'}else{ad.style.background='#fff2f0';ad.style.borderColor='#ff4d4f';at.textContent='❌ 回答错误';at.style.color='#ff4d4f'}
    let txt=`正确答案是 <strong style="color:#52c41a;">${lbs[q.answer]}</strong>。<br>`;
    if(q.analysis)txt+=`<br><strong>解析：</strong>${q.analysis}`;else txt+=`<br>${esc(q.options[q.answer])}`;
    ac.innerHTML=txt;ad.style.display='block';
    if(ok){if(ps.currentIndex<ps.questions.length-1){setTimeout(()=>{ps.currentIndex++;showQ()},500)}else{setTimeout(()=>showResult(),500)}}
    else{let btn=ps.currentIndex<ps.questions.length-1?'<button onclick="nextQ()" style="padding:12px 40px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">下一题</button>':'<button onclick="showResult()" style="padding:12px 40px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">查看结果</button>';ac.innerHTML+=`<div style="margin-top:20px;text-align:center;">${btn}</div>`}
}

function nextQ(){ps.currentIndex++;showQ()}
function prevQ(){if(ps.currentIndex>0){ps.currentIndex--;showQ()}}
function showResult(){
    document.getElementById('parea').style.display='none';document.getElementById('pres').style.display='block';
    let total=ps.questions.length,correct=ps.correctCount,pct=Math.round((correct/total)*100);
    document.getElementById('rem').textContent=pct>=90?'🏆':pct>=80?'🎉':pct>=60?'👍':'💪';
    let s=document.getElementById('rsc');s.textContent=pct+'%';s.style.color=pct>=80?'#52c41a':pct>=60?'#faad14':'#ff4d4f';
    document.getElementById('rdt').textContent=`共 ${total} 题 | 正确 ${correct} 题 | 错误 ${total-correct} 题`;
}
function restartPractice(){let bank=BANKS[ps.bankId];let qs=shuffleBank(bank.questions);ps={bankId:ps.bankId,questions:qs,currentIndex:0,answers:new Array(qs.length).fill(null),correctCount:0};document.getElementById('pres').style.display='none';document.getElementById('parea').style.display='block';showQ()}
function changeBank(){document.getElementById('pres').style.display='none';document.getElementById('parea').style.display='none';document.getElementById('psel').style.display='block';document.getElementById('pbank').value=''}

// ===== 用户答题功能 =====
function showExamQ(){
    let q=es.questions[es.currentIndex],cur=es.currentIndex+1,total=es.questions.length,lbs=['A','B','C','D','E','F'],prevAns=es.answers[es.currentIndex],isAns=prevAns!==null;
    document.getElementById('exam-ptxt').textContent=`${cur}/${total}`;
    document.getElementById('exam-pbar').style.width=`${(cur/total)*100}%`;
    let nav='';
    if(es.currentIndex>0)nav=`<div style="margin-bottom:15px;"><button onclick="prevExamQ()" style="padding:10px 20px;background:#f0f0f0;border:none;border-radius:8px;cursor:pointer;color:#666;font-weight:500;">← 上一题</button></div>`;
    document.getElementById('exam-q').innerHTML=nav+`<div style="padding:25px;background:#f8f9fa;border-radius:12px;border:1px solid #e0e0e0;"><div style="font-weight:600;color:#333;font-size:18px;line-height:1.6;white-space:pre-wrap;word-break:break-word;"><span class="qn" style="width:32px;height:32px;font-size:16px;">${cur}</span>${renderQText(q.question)}</div></div>`;
    let o='';
    q.options.forEach((opt,i)=>{
        let st='display:flex;align-items:center;padding:15px 20px;margin-bottom:12px;background:#fff;border-radius:10px;border:2px solid #e0e0e0;',bdg='',clk='';
        if(isAns){
            st+='pointer-events:none;';
            if(i===q.answer){st+='border-color:#52c41a;background:#f6ffed;';bdg=`<span style="color:#52c41a;font-weight:600;margin-left:10px;">✓ 正确</span>`}
            else if(i===prevAns){st+='border-color:#ff4d4f;background:#fff2f0;';bdg=`<span style="color:#ff4d4f;font-weight:600;margin-left:10px;">✗ 错误</span>`}
            else st+='opacity:0.6;'
        }
        else{st+='cursor:pointer;';clk=`onclick="selExam(${i})" onmouseover="this.style.borderColor='#667eea'" onmouseout="this.style.borderColor='#e0e0e0'"`}
        o+=`<div ${clk} style="${st}"><span style="font-weight:600;color:#667eea;margin-right:12px;font-size:16px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:#f0f2ff;border-radius:50%;">${lbs[i]}</span><span style="color:#333;font-size:16px;flex:1;">${esc(opt)}</span>${bdg}</div>`;
    });
    document.getElementById('exam-o').innerHTML=o;
    let ad=document.getElementById('exam-a'),nd=document.getElementById('exam-nav');
    if(isAns){
        let ok=prevAns===q.answer;
        ad.style.background=ok?'#f6ffed':'#fff2f0';ad.style.border=ok?'1px solid #52c41a':'1px solid #ff4d4f';
        ad.innerHTML=`<div style="font-weight:600;font-size:18px;margin-bottom:10px;color:${ok?'#52c41a':'#ff4d4f'};">${ok?'🎉 回答正确！':'❌ 回答错误'}</div><div style="line-height:1.6;">正确答案是 <strong style="color:#52c41a;">${lbs[q.answer]}</strong>。${q.analysis?`<br><br><strong>解析：</strong>${q.analysis}`:''}</div>`;
        ad.style.display='block';
        nd.innerHTML=es.currentIndex<es.questions.length-1?'<button onclick="nextExamQ()" style="padding:12px 40px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">下一题</button>':'<button onclick="showExamResult()" style="padding:12px 40px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">查看结果</button>';
        nd.style.display='block';
    }else{ad.style.display='none';nd.style.display='none'}
}
function selExam(idx){
    let q=es.questions[es.currentIndex];
    es.answers[es.currentIndex]=idx;
    let ok=idx===q.answer;
    if(ok)es.correctCount++;
    showExamQ();
    if(ok){
        if(es.currentIndex<es.questions.length-1)setTimeout(()=>{es.currentIndex++;showExamQ()},500);
        else setTimeout(()=>showExamResult(),500);
    }
}
function nextExamQ(){es.currentIndex++;showExamQ()}
function prevExamQ(){if(es.currentIndex>0){es.currentIndex--;showExamQ()}}
function showExamResult(){
    document.getElementById('exam-qarea').style.display='none';document.getElementById('exam-res').style.display='block';
    let total=es.questions.length,correct=es.correctCount,pct=Math.round((correct/total)*100);
    document.getElementById('exam-res').innerHTML=`<div style="font-size:80px;margin-bottom:20px;">${pct>=90?'🏆':pct>=80?'🎉':pct>=60?'👍':'💪'}</div><div style="font-size:48px;font-weight:700;margin-bottom:15px;color:${pct>=80?'#52c41a':pct>=60?'#faad14':'#ff4d4f'};">${pct}%</div><div style="color:#666;font-size:16px;">共 ${total} 题 | 正确 ${correct} 题 | 错误 ${total-correct} 题</div><div style="margin-top:30px;display:flex;gap:15px;justify-content:center;"><button class="btn btn-p" onclick="restartExam()" style="max-width:200px">重新答题</button><button class="btn btn-s" onclick="logout()" style="max-width:200px">返回解锁</button></div>`;
}
function restartExam(){
    let bank=BANKS[es.bankId];
    let qs=shuffleBank(bank.questions);
    es={bankId:es.bankId,questions:qs,currentIndex:0,answers:new Array(qs.length).fill(null),correctCount:0};
    document.getElementById('exam-res').style.display='none';
    document.getElementById('exam-qarea').style.display='block';
    showExamQ();
}

// ===== 初始化 =====
window.onload=function(){
    initBrowserId();
    let am=document.getElementById('auto-msg');
    if(localStorage.getItem('admin_session')){if(am)am.style.display='none';enterAdmin();return}
    if(am){am.style.display='block';am.innerHTML='<span class="spin"></span>检测登录状态...'}
    checkSession().finally(()=>{if(am)am.style.display='none'});
};
function initBrowserId(){
    try{
        let id=localStorage.getItem('browser_id');
        if(!id||!/^[A-Z0-9_]{3,64}$/.test(id)){
            let raw=fp();
            id=String(raw).toUpperCase().replace(/[^A-Z0-9_]/g,'');
            if(id.length<3)id='BR_'+Math.random().toString(36).slice(2,10).toUpperCase();
            localStorage.setItem('browser_id',id);
        }
        let el=document.getElementById('bid-val');
        if(el)el.textContent=id;
    }catch(e){
        let el=document.getElementById('bid-val');
        if(el)el.textContent='BR_'+Math.random().toString(36).slice(2,10).toUpperCase();
    }
}
function copyBrowserId(){
    let id=document.getElementById('bid-val').textContent;
    navigator.clipboard.writeText(id).then(()=>t('浏览器ID已复制：'+id)).catch(()=>{
        let ta=document.createElement('textarea');ta.value=id;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);t('浏览器ID已复制');
    });
}
</script>
