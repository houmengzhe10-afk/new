<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库管理系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 70%,#533483 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .panel{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:40px;width:100%;max-width:480px;text-align:center}
        .panel.wide{max-width:1000px}
        .panel h1{color:#333;margin-bottom:10px;font-size:28px}
        .subtitle{color:#999;margin-bottom:30px;font-size:14px}
        .fg{margin-bottom:20px;text-align:left}
        .fg label{display:block;margin-bottom:8px;color:#555;font-weight:500;font-size:14px}
        .fg select,.fg input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;transition:.3s}
        .fg select:focus,.fg input:focus{outline:none;border-color:#667eea}
        .btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:.3s}
        .btn-p{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
        .btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(102,126,234,.4)}
        .btn-g{background:#52c41a;color:#fff;margin-top:15px}
        .btn-r{background:#ff4d4f;color:#fff}
        .btn-s{background:#8c8c8c;color:#fff;margin-top:10px}
        .btn-xs{padding:6px 12px;font-size:13px;border:none;border-radius:4px;cursor:pointer}
        .msg{margin-top:15px;font-size:14px;min-height:20px}
        .err{color:#ff4d4f}.ok{color:#52c41a}
        .hidden{display:none!important}
        .sec{margin-bottom:35px;padding:25px;background:#f8f9fa;border-radius:12px}
        .sec h3{color:#333;margin-bottom:20px;font-size:18px}
        .sec h3::before{content:'';display:inline-block;width:4px;height:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:2px;margin-right:10px;vertical-align:middle}
        .key-item{padding:15px;background:#fff;border-radius:8px;margin-bottom:10px;border:1px solid #e0e0e0;display:flex;flex-direction:column;gap:10px}
        .key-val{font-family:'Consolas',monospace;font-size:16px;color:#667eea;font-weight:600;margin-bottom:5px;word-break:break-all}
        .key-meta{font-size:12px;color:#999}
        .key-acts{display:flex;gap:10px;justify-content:flex-end}
        .toast{position:fixed;top:20px;right:20px;padding:15px 25px;border-radius:8px;color:#fff;z-index:10001;animation:slideR .3s;font-weight:500}
        .toast.ok{background:#52c41a}.toast.err{background:#ff4d4f}
        @keyframes slideR{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
        .q{margin-bottom:25px;padding:20px;background:#f8f9fa;border-radius:10px;border:1px solid #e0e0e0}
        .qn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border-radius:50%;margin-right:10px;font-size:14px}
        .qt{font-size:16px;color:#333;line-height:1.7;margin-bottom:15px}
        .ops{margin-left:38px}
        .op{padding:10px 15px;margin-bottom:8px;background:#fff;border-radius:6px;border:1px solid #e0e0e0}
        .ol{font-weight:600;color:#667eea;margin-right:8px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:10000;justify-content:center;align-items:center}
        .modal.active{display:flex}
        .modal-box{background:#fff;padding:40px;border-radius:16px;width:90%;max-width:400px;text-align:center;animation:slideIn .3s}
        @keyframes slideIn{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
        .eh{border-bottom:2px solid #f0f0f0;padding-bottom:20px;margin-bottom:25px;display:flex;justify-content:space-between;align-items:center}
        .eh h2{color:#333;font-size:22px}
        .xbtn{padding:8px 20px;background:#f0f0f0;border:none;border-radius:6px;cursor:pointer;color:#666;font-size:14px}
        .xbtn:hover{background:#e0e0e0;color:#333}
        .cbank{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:15px 20px;border-radius:8px;margin-bottom:20px;text-align:left}
        .cbank strong{font-size:16px}
        .spin{display:inline-block;width:20px;height:20px;border:3px solid #f0f0f0;border-top-color:#667eea;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .bcheck{display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 14px;background:#fff;border:2px solid #e0e0e0;border-radius:6px;font-size:14px;color:#555;transition:.2s;user-select:none}
        .bcheck input{display:none}
        .bcheck.sel{border-color:#667eea;background:#f0f2ff;color:#667eea;font-weight:500}
        .btile{display:inline-block;padding:3px 10px;background:rgba(102,126,234,.15);color:#667eea;border-radius:4px;font-size:12px;margin:2px 4px;white-space:nowrap}
        body{align-items:flex-start;padding:36px 18px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 70%,#533483 100%);color:#e2e8f0}
        .panel{background:linear-gradient(145deg,rgba(255,255,255,.06) 0%,rgba(255,255,255,.02) 100%);border:1px solid rgba(255,255,255,.1);box-shadow:0 24px 70px rgba(0,0,0,.3);border-radius:22px;padding:34px;text-align:left;backdrop-filter:blur(20px)}
        .panel:not(.wide){text-align:center;margin-top:9vh}
        .panel.wide{max-width:1080px;margin:0 auto}
        .panel h1,.panel h2{letter-spacing:.5px;color:#fff}
        .subtitle{text-align:center;color:#94a3b8}
        .fg{margin-bottom:18px}
        .fg label{color:#cbd5e1;font-weight:700}
        .fg input,.fg select{height:46px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.06);color:#e2e8f0}
        .fg input::placeholder,.fg select::placeholder{color:#64748b}
        .fg input:focus,.fg select:focus{border-color:#818cf8;box-shadow:0 0 0 4px rgba(129,140,248,.2);outline:none}
        .btn,.xbtn,.btn-xs{border-radius:12px;box-shadow:none}
        .btn:hover,.xbtn:hover,.btn-xs:hover{transform:translateY(-1px)}
        .btn-p{background:linear-gradient(135deg,#818cf8 0%,#a78bfa 50%,#c084fc 100%);color:#fff}
        .btn-p:hover{box-shadow:0 8px 25px rgba(129,140,248,.4)}
        .btn-g{background:linear-gradient(135deg,#34d399 0%,#10b981 100%);color:#fff;margin-top:15px}
        .btn-g:hover{box-shadow:0 8px 25px rgba(52,211,153,.4)}
        .btn-r{background:linear-gradient(135deg,#f87171 0%,#ef4444 100%);color:#fff}
        .btn-r:hover{box-shadow:0 8px 25px rgba(248,113,113,.4)}
        .btn-s{background:rgba(255,255,255,.08);color:#94a3b8;margin-top:10px;border:1px solid rgba(255,255,255,.1)}
        .btn-s:hover{background:rgba(255,255,255,.14);color:#e2e8f0}
        .eh{background:linear-gradient(135deg,rgba(129,140,248,.15) 0%,rgba(192,132,252,.1) 100%);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px 20px;margin-bottom:22px}
        .eh h1,.eh h2{margin:0;color:#fff}
        .xbtn{padding:8px 20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;color:#94a3b8;font-size:14px}
        .xbtn:hover{background:rgba(255,255,255,.14);color:#e2e8f0}
        .sec{border:1px solid rgba(255,255,255,.08);background:linear-gradient(145deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.01) 100%);border-radius:18px;padding:24px;margin-bottom:22px}
        .sec h3{display:flex;align-items:center;margin-bottom:18px;color:#e2e8f0}
        .sec h3::before{background:linear-gradient(135deg,#818cf8 0%,#c084fc 100%)}
        .key-item{border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 18px;background:linear-gradient(145deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,.02) 100%);box-shadow:0 8px 24px rgba(0,0,0,.1)}
        .key-val{color:#a78bfa}
        .key-meta{color:#64748b}
        .key-acts{padding-top:4px;border-top:1px dashed rgba(255,255,255,.08)}
        .cbank{background:linear-gradient(135deg,#818cf8 0%,#a78bfa 50%,#c084fc 100%);border-radius:16px;padding:16px 18px;box-shadow:0 10px 26px rgba(129,140,248,.3)}
        #bank-checks{display:grid!important;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px!important}
        .bcheck{justify-content:center;min-height:44px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8}
        .bcheck.sel{border-color:#818cf8;background:rgba(129,140,248,.15);color:#a78bfa;box-shadow:0 0 0 4px rgba(129,140,248,.15)}
        .bdd{position:relative}
        .bdd-tg{width:100%;min-height:46px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.06);padding:8px 40px 8px 14px;cursor:pointer;display:flex;align-items:center;flex-wrap:wrap;gap:6px;color:#64748b;font-size:15px;position:relative;transition:.2s}
        .bdd-tg:hover,.bdd.open .bdd-tg{border-color:#818cf8;box-shadow:0 0 0 4px rgba(129,140,248,.2)}
        .bdd-tg::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#818cf8;font-size:14px;transition:.2s}
        .bdd.open .bdd-tg::after{transform:translateY(-50%) rotate(180deg)}
        .bdd-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(129,140,248,.2);color:#a78bfa;padding:3px 8px 3px 10px;border-radius:6px;font-size:13px;font-weight:500}
        .bdd-tag span{cursor:pointer;color:#94a3b8;font-weight:700;line-height:1}
        .bdd-tag span:hover{color:#f87171}
        .bdd-pn{position:absolute;top:calc(100% + 6px);left:0;right:0;background:linear-gradient(145deg,#1e293b 0%,#1a1a2e 100%);border:1px solid rgba(255,255,255,.1);border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.4);padding:6px;z-index:20;max-height:240px;overflow-y:auto;display:none}
        .bdd.open .bdd-pn{display:block}
        .bdd-it{padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;color:#94a3b8;transition:.15s}
        .bdd-it:hover{background:rgba(129,140,248,.1)}
        .bdd-it.sel{background:rgba(129,140,248,.15);color:#a78bfa;font-weight:600}
        .bdd-it::before{content:'';width:16px;height:16px;border:1.5px solid #475569;border-radius:4px;flex-shrink:0;display:inline-block;transition:.15s}
        .bdd-it.sel::before{background:#818cf8;border-color:#818cf8;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M3.5 8l3 3 6-6' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-size:cover}
        .bid-badge{position:fixed;top:14px;right:14px;z-index:99999;background:rgba(30,41,59,.96);border:1px solid rgba(129,140,248,.3);border-radius:999px;padding:8px 14px;font-size:13px;color:#e2e8f0;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;align-items:center;gap:8px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;backdrop-filter:blur(6px);cursor:pointer;transition:.2s;user-select:none;pointer-events:auto}
        .bid-badge:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(0,0,0,.4)}
        .bid-badge .bid-dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#818cf8,#c084fc);box-shadow:0 0 0 3px rgba(129,140,248,.2)}
        .bid-badge .bid-lb{color:#64748b;font-size:12px}
        .bid-badge .bid-val{font-family:'Consolas','SF Mono',monospace;font-weight:600;color:#a78bfa;letter-spacing:.5px}
        .ta-wrap{margin:20px 0}
        .ta-wrap textarea{width:100%;min-height:120px;padding:14px 16px;border:2px solid rgba(255,255,255,.1);border-radius:12px;font-size:15px;font-family:'Consolas','SF Mono','Courier New',monospace;line-height:1.7;resize:vertical;background:rgba(255,255,255,.04);color:#e2e8f0;transition:.2s}
        .ta-wrap textarea:focus{outline:none;border-color:#818cf8;box-shadow:0 0 0 4px rgba(129,140,248,.2)}
        .ta-wrap textarea:disabled{background:rgba(255,255,255,.02);color:#64748b;cursor:not-allowed}
        .ta-submit{padding:12px 40px;background:linear-gradient(135deg,#818cf8 0%,#a78bfa 50%,#c084fc 100%);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;margin-top:10px}
        .ta-submit:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(129,140,248,.4)}
        .ta-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
        .ta-ans{font-family:'Consolas','SF Mono','Courier New',monospace;background:rgba(255,255,255,.04);padding:12px 16px;border-radius:8px;margin-top:10px;white-space:pre-wrap;word-break:break-word;font-size:14px;line-height:1.7;color:#e2e8f0;border:1px solid rgba(255,255,255,.08)}
        .om{cursor:pointer;transition:.15s}.om-sel{border-color:#818cf8!important;background:rgba(129,140,248,.15)!important;box-shadow:0 0 0 3px rgba(129,140,248,.2)}
        #klist{display:grid;gap:12px}
        #exam-q>div,#pq>div{box-shadow:0 8px 24px rgba(0,0,0,.15)}
        #exam-o>div,#po>div{box-shadow:0 6px 18px rgba(0,0,0,.1);transition:.2s}
        #exam-a,#pa{border:1px solid transparent;box-shadow:0 8px 24px rgba(0,0,0,.15)}
        #exam-bank-list>div{box-shadow:0 12px 28px rgba(129,140,248,.2)}
        .modal{backdrop-filter:blur(8px)}
        .modal-box{background:linear-gradient(145deg,#1e293b 0%,#1a1a2e 100%);border-radius:20px;box-shadow:0 24px 70px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08)}
        .modal-box h2,.modal-box h3{color:#fff}
        .modal-box p{color:#94a3b8}
        .q{background:linear-gradient(145deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,.02) 100%);border:1px solid rgba(255,255,255,.08);color:#e2e8f0}
        .qt{color:#e2e8f0}
        .op{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#e2e8f0}
        .ol{color:#a78bfa}
        .msg{color:#94a3b8}
        .err{color:#f87171}.ok{color:#34d399}
        .qn{background:linear-gradient(135deg,#818cf8 0%,#c084fc 100%)}
        .oi{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#e2e8f0;cursor:pointer;transition:.15s;padding:10px 15px;margin-bottom:8px;border-radius:8px}
        .oi:hover{border-color:#818cf8;background:rgba(129,140,248,.1)}
        .oi .ol{display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;background:rgba(129,140,248,.2);border-radius:50%;margin-right:8px;font-size:13px;font-weight:700}
        .spin{border-color:rgba(255,255,255,.1);border-top-color:#818cf8}
        #auto-msg{background:rgba(52,211,153,.1)!important;border-color:rgba(52,211,153,.3)!important;color:#34d399!important}
        @media (max-width:640px){body{padding:16px 10px}.panel{padding:22px;border-radius:18px}.eh{flex-direction:column;gap:12px;align-items:stretch;text-align:center}.key-acts{justify-content:stretch}.key-acts button{flex:1}#exam-bank-list{flex-direction:column!important}.panel:not(.wide){margin-top:4vh}}
    </style>
</head>
<body>
<div class="bid-badge" id="bid-badge" title="点击复制浏览器ID" onclick="copyBrowserId()"><span class="bid-dot"></span><span class="bid-lb">浏览器ID</span><span class="bid-val" id="bid-val">-</span></div>
<div class="panel" id="user-panel">
    <h1>题库解锁</h1>
    <p class="subtitle">请输入密钥查看试题内容</p>
    <div class="fg">
        <label>输入密钥</label>
        <input type="text" id="user-key" placeholder="请输入您的专属密钥" autocomplete="off">
    </div>
    <button class="btn btn-p" onclick="unlock()">解锁题库</button>
    <p class="msg err" id="user-err"></p>
    <div id="auto-msg" style="display:none;margin-top:15px;padding:12px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:8px;color:#34d399;font-size:13px;">
        <span class="spin"></span>检测登录状态...
    </div>
</div>

<div class="panel wide hidden" id="exam-panel">
    <div class="eh"><h2>试题内容</h2><button class="xbtn" onclick="logout()">退出</button></div>
    <div class="cbank"><strong>当前题库：</strong><span id="bank-name"></span></div>
    <div id="exam-bank-chooser" style="display:none;text-align:center;padding:40px 20px;">
        <h3 style="color:#e2e8f0;margin-bottom:20px;">请选择要查看的试题库</h3>
        <div id="exam-bank-list" style="display:flex;flex-wrap:wrap;gap:15px;justify-content:center;"></div>
    </div>
    <div style="margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:#94a3b8;font-size:14px;">答题进度</span><span id="exam-ptxt" style="color:#a78bfa;font-weight:600;">0/0</span></div>
        <div style="height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;"><div id="exam-pbar" style="height:100%;background:linear-gradient(135deg,#818cf8 0%,#c084fc 100%);width:0%;transition:width .3s;"></div></div>
        <div id="exam-stats" style="display:flex;gap:20px;margin-top:12px;justify-content:center;">
            <span style="font-size:13px;color:#34d399;">✓ 正确: <strong id="exam-correct">0</strong></span>
            <span style="font-size:13px;color:#f87171;">✗ 错误: <strong id="exam-wrong">0</strong></span>
            <span style="font-size:13px;color:#a78bfa;">正确率: <strong id="exam-acc">0%</strong></span>
        </div>
    </div>
    <div id="exam-qarea">
        <div id="exam-q"></div>
        <div id="exam-o" style="margin:20px 0;"></div>
        <div id="exam-a" style="display:none;padding:20px;border-radius:12px;margin-bottom:20px;"></div>
        <div id="exam-nav" style="display:none;text-align:center;margin-top:20px;"></div>
    <div style="text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08);">
        <button onclick="endExamEarly()" style="padding:10px 30px;background:#ff4d4f;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.3s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">结束答题</button>
    </div>
    </div>
    <div id="exam-res" style="display:none;text-align:center;padding:40px 20px;"></div>
</div>

<div class="panel wide hidden" id="admin-panel">
    <div class="eh"><h1 style="color:#a78bfa;font-size:26px;">管理员后台</h1><span style="background:linear-gradient(135deg,#818cf8 0%,#c084fc 100%);color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;">管理员模式</span></div>
    <div class="sec">
        <h3>用户密钥管理</h3>
        <div class="fg"><label>自定义密钥（留空自动生成）</label><input type="text" id="ckey" placeholder="留空自动生成8位随机密钥"></div>
        <div class="fg"><label>绑定浏览器ID <span style="color:#ff4d4f;">*</span></label><input type="text" id="cbid" placeholder="请输入用户浏览器ID（让用户从其浏览器左上角复制）" style="font-family:'Consolas',monospace;letter-spacing:.5px;text-transform:uppercase;"></div>
        <div class="fg"><label>备注（可选）</label><input type="text" id="kremark" placeholder="如：张三的密钥"></div>
        <div class="fg"><label>绑定试题库（可多选）</label><div id="bank-dd" class="bdd"><div class="bdd-tg" id="bank-dd-tg" onclick="event.stopPropagation();toggleBankDD()"><span id="bank-dd-ph">请选择试题库</span></div><div class="bdd-pn" id="bank-dd-pn"></div></div></div>
        <button class="btn btn-g" onclick="genKey()">生成密钥</button>
        <div style="margin-top:30px;"><h4 style="margin-bottom:15px;color:#cbd5e1;">已生成密钥列表</h4><div id="klist"><p style="color:#64748b;text-align:center;padding:20px;">暂无密钥</p></div></div>
    </div>
    <div class="sec" style="background:linear-gradient(135deg,#818cf8 0%,#a78bfa 50%,#c084fc 100%);color:#fff;text-align:center;">
        <h3 style="color:#fff;">题库练习</h3><p style="margin-bottom:20px;opacity:.9;">管理员可在此进行题库练习和测试</p>
        <button class="btn" onclick="enterPractice()" style="background:#fff;color:#818cf8;max-width:200px;margin:0 auto;">进入刷题模式</button>
    </div>
    <div class="sec">

        {type:'text',question:'短视频系统数据表：\n用户表：user(uid, username, realname, birthday, sex, mobile, intro)\n视频类别表：videotype(tid, typename)\n视频表：video(vid, title, uid, createtime, tid, filename, duration)\n评论表：comment(cid, uid, vid, commentdate, content)\n点赞表：likes(lid, uid, vid)\n\n7、查询标题中包含楷书字样且在\'2024-01-20\'至\'2024-01-26\'期间发布的视频信息。',answer:'Select * from video where title like \'%楷书%\' and createtime between \'2024-01-20\' and \'2024-01-26\'',analysis:'LIKE 配合 % 通配符实现模糊匹配，BETWEEN AND 限定日期范围。'},

        {question:'患者男,65岁。吸烟40年,每天消耗2包,慢性咳嗽、咳痰10多年,冬季咳嗽严重,痰多伴气喘。该患者目前最需要采取的措施是',options:['戒烟','进行呼吸与耐寒训练','咳嗽严重时可使用镇咳药','急性期应使用抗生素'],answer:0,analysis:'戒烟是慢性阻塞性肺病患者最重要的干预措施'},

        {question:'患者男,56岁。就诊主诉:右肩疼痛活动受限一年,夜间为甚,逐渐加重,肩关节活动受限日益加重,半年前缓解,怕冷,肩关节广泛压痛,MRI诊断为肩周炎。肩周炎的康复训练不包括',options:['爬墙运动','弯腰晃肩法','外旋锻炼','甩手训练','被动运动'],answer:4,analysis:'肩周炎康复训练包括主动运动如爬墙、弯腰晃肩、外旋、甩手等，被动运动不属于主动康复训练内容'},

        {question:'患者,女,70岁,因"渐进性认知功能下降2年,性情改变6个月"入院。2年前患者出现近事遗忘,日常丢三落四;6个月前开始出现易怒、多疑,拒绝他人照顾,偶尔出现哭笑无常,尚能完成简单穿衣、进食等日常活动,无明显神经系统原始反射。实验室检查无明显异常,脑电图示慢波增多,临床诊断为阿尔茨海默病。针对该患者的运动康复,以下哪种方法不适合',options:['太极拳','日常家务等作业疗法','卧床静养,减少活动','简单的氧耐力训练','不对称运动游戏'],answer:2,analysis:'阿尔茨海默病患者应进行适当运动康复，卧床静养会加速功能衰退'},
        {question:'某男性患者,40岁,因车祸致腰椎椎体骨折,6个月前已行钢板固定手术。患者自述S4-5节段无感觉,也无运动功能。目前留置导尿,小便可解但不能完全排空,测定膀胱残余尿量为300ml。现可独立坐稳,也可练习抛接球训练。平卧位可全范围屈髋,无需辅助,然而伸膝不能。根据ASIA分级,患者目前处于()',options:['A级','B级','C级','D级','E级'],answer:1,analysis:'ASIA B级为不完全性损伤，损伤平面以下包括S4-S5保留感觉功能，无运动功能'},
        {question:'某男性患者,40岁,因车祸致腰椎椎体骨折,6个月前已行钢板固定手术。患者自述S4-5节段无感觉,也无运动功能。目前留置导尿,小便可解但不能完全排空,测定膀胱残余尿量为300ml。现可独立坐稳,也可练习抛接球训练。平卧位可全范围屈髋,无需辅助,然而伸膝不能。根据患者目前膀胱残余尿量情况,不正确的处理措施是()',options:['定时定量饮水','仍需留置导尿','教会患者膀胱的自我训练','教会患者清洁导尿','电刺激辅助治疗'],answer:1,analysis:'膀胱残余尿量300ml可拔除导尿管，进行膀胱自我训练和清洁导尿'},
        {question:'某男性患者,40岁,因车祸致腰椎椎体骨折,6个月前已行钢板固定手术。患者自述S4-5节段无感觉,也无运动功能。目前留置导尿,小便可解但不能完全排空,测定膀胱残余尿量为300ml。现可独立坐稳,也可练习抛接球训练。平卧位可全范围屈髋,无需辅助,然而伸膝不能。患者目前的损伤平面应为()',options:['T12','L1','L2','L3','L4'],answer:2,analysis:'L2运动平面关键肌为髂腰肌，患者可全范围屈髋，提示髂腰肌肌力正常，损伤平面为L2'},
        {question:'某男性患者,40岁,因车祸致腰椎椎体骨折,6个月前已行钢板固定手术。患者自述S4-5节段无感觉,也无运动功能。目前留置导尿,小便可解但不能完全排空,测定膀胱残余尿量为300ml。现可独立坐稳,也可练习抛接球训练。平卧位可全范围屈髋,无需辅助,然而伸膝不能。患者下一步的治疗方案中,不正确的是()',options:['强化屈髋力量训练','强化上肢力量','转移训练','站立训练','单纯被动运动'],answer:4,analysis:'患者可进行主动训练，不应仅进行单纯被动运动'},
        {question:'某男性患者,40岁,因车祸致腰椎椎体骨折,6个月前已行钢板固定手术。患者自述S4-5节段无感觉,也无运动功能。目前留置导尿,小便可解但不能完全排空,测定膀胱残余尿量为300ml。现可独立坐稳,也可练习抛接球训练。平卧位可全范围屈髋,无需辅助,然而伸膝不能。患者目前的坐位平衡分级为()',options:['零级平衡','一级平衡','二级平衡','三级平衡','四级平衡'],answer:2,analysis:'患者可独立坐稳并进行抛接球训练，提示坐位平衡为二级（自动动态平衡）'},
        {question:'某男性患者,40岁,因车祸致腰椎椎体骨折,6个月前已行钢板固定手术。患者自述S4-5节段无感觉,也无运动功能。目前留置导尿,小便可解但不能完全排空,测定膀胱残余尿量为300ml。现可独立坐稳,也可练习抛接球训练。平卧位可全范围屈髋,无需辅助,然而伸膝不能。根据病史,患者将来预后最可能会是()',options:['只能依靠轮椅代步','可在佩戴KAFO下实现室内步行','可在佩戴AFO下实现室内步行','可在佩戴KAFO下实现社区步行','可完全恢复正常'],answer:1,analysis:'L2脊髓损伤患者预后可在佩戴膝踝足矫形器（KAFO）下实现室内步行'},
        {question:'男性,66岁。因"双上肢震颤半年,加重伴肢体僵硬行走不稳1个月"入院,既往健康。住院诊断"帕金森病",经口服药物治疗后震颤减轻,但步态不稳,行走时双下肢拖地。根据患者目前情况,下一步治疗不妥的是',options:['加大口服药物剂量','进行步态训练','给予松弛训练','给予平衡训练'],answer:0,analysis:'患者药物治疗后震颤减轻，出现步态不稳，应进行康复训练，不应盲目加大药物剂量'},
        {question:'男性,66岁。因"双上肢震颤半年,加重伴肢体僵硬行走不稳1个月"入院,既往健康。住院诊断"帕金森病",经口服药物治疗后震颤减轻,但步态不稳,行走时双下肢拖地。患者经治疗后目前存在起步、转身困难,治疗中不应采取的措施是',options:['治疗师给予指令加快启动速度和步行速度','按照地面上的标记进行行走步幅训练','尽快加大摆动上肢和旋转躯干的幅度','按治疗师的指令进行上、下肢协同运动训练'],answer:2,analysis:'帕金森病患者起步、转身困难时，应循序渐进进行训练，不能尽快加大运动幅度'},
        {question:'男性,65岁,"渐进性双手活动笨拙伴震颤1年余,加重13天",震颤安静时明显,右手为重。体检:意识清,问话能正确回答,面具脸,无面瘫,右手呈搓泥丸样。四肢肌力正常,双上肢肌张力呈齿轮样增强,右上肢明显,双侧病理征阴性。头CT提示脑部苍白球病理性钙化,该患者不宜选择的训练是',options:['松弛训练','关节牵伸训练','步态训练','抗阻肌力训练'],answer:3,analysis:'帕金森病患者肌强直明显，不宜进行抗阻肌力训练，以免加重肌强直'},
        {question:'某男性脊髓损伤患者,脊髓损伤后感觉运动功能检查发现损伤水平以下存在运动功能,肛门反射存在,关键肌力为4级,根据ASIA分级,患者目前处于',options:['A级','B级','C级','D级'],answer:3,analysis:'ASIA D级为不完全性损伤，损伤平面以下运动功能存在，大多数关键肌肌力≥3级'},
        {question:'脊髓休克的概念错误的是',options:['脊髓受伤后运动功能完全丧失','神经反射全部丧失','有球-肛门反射','损伤平面以下感觉全部丧失'],answer:2,analysis:'脊髓休克时球-肛门反射消失，反射恢复提示脊髓休克结束'},
        {question:'下列不属于胸段脊髓损伤后可出现的功能障碍是',options:['深静脉血栓','肩手综合征','大便困难','尿潴留'],answer:1,analysis:'肩手综合征是脑卒中的常见并发症，胸段脊髓损伤不会出现'},
        {question:'下列关于ASIA损伤分级的叙述,正确的是',options:['A级完全损伤,S4-5无运动功能,感觉功能正常','B级不完全损伤,损伤平面以下,包括S4-5保留感觉、运动功能','C级不完全损伤,损伤水平以下感觉功能存在,大多数关键肌肌力小于4级','D级不完全损伤,损伤水平以下运动功能存在,大多数关键肌肌力大于等于3级'],answer:3,analysis:'ASIA D级定义为不完全性损伤，损伤平面以下运动功能存在，大多数关键肌肌力≥3级'},
        {question:'下列关于脊髓损伤后急性期康复治疗措施错误的是',options:['患者卧位时应保持肢体于功能位','四肢瘫患者采用手功能位夹板使腕、手保持于功能位','定时给四肢关节进行被动活动','可不做排痰训练','患者可利用电动起立床进行站立训练'],answer:3,analysis:'脊髓损伤急性期应加强排痰训练，预防肺部感染'},
        {question:'下列关于坐轮椅时的姿势,不正确的是',options:['双眼平视,两肩放松,身体上部稍向前倾','臀部紧贴靠背','大小腿之间的角度保持90°','驱动轮椅时肘关节保持120°左右为宜'],answer:2,analysis:'坐轮椅时大小腿之间的角度应保持110-130°，以90°为宜是错误的'},
        {question:'颅脑损伤患者急性期的康复治疗目标不包括',options:['提高觉醒能力','促进功能恢复','防治各种并发症','学会代偿性方法'],answer:3,analysis:'学会代偿性方法是恢复期的康复目标，不是急性期目标'},
        {question:'轻度脑外伤GCS评分是',options:['GCS评分4-7分','GCS评分8-10分','GCS评分9-12分','GCS评分13-15分'],answer:3,analysis:'GCS评分13-15分为轻度脑外伤，9-12分为中度，3-8分为重度'},
        {question:'以下关于电脑软件在认知训练中的应用,不正确的是',options:['电脑软件提供的刺激强度可控,给予的反馈及时、客观','电脑软件进行认知训练时可以节省治疗师的劳动','电脑软件操作的趣味性较大,患者常乐于使用','鉴于上述特点,电脑软件训练可以代替治疗师'],answer:3,analysis:'电脑软件训练不能代替治疗师，只能作为辅助手段'},
        {question:'患者,女 58岁,车祸导致语言理解障碍半年收入院。查体:患者神清,有自发言语表达,但不能和周围人进行交流,构音清晰,肢体运动功能未出现异常。该患者的康复治疗,错误的是',options:['对患者进行言语、认知功能评定,采取综合治疗手段','采取多途径的言语刺激方法,促进言语理解功能的恢复','重视患者心理治疗,鼓励患者多与人交流','主要用营养神经药物治疗'],answer:3,analysis:'语言理解障碍应进行言语康复训练，不能仅依靠药物治疗'},
        {question:'患者,女性52岁,因右侧肢体偏瘫到康复科治疗,患者痛温觉、触觉、本体感觉正常,但不能通过手触摸辨认物体的形态。该患者属于哪种失认症',options:['视觉失认症','听觉失认症','触觉失认症','身体失认症'],answer:2,analysis:'不能通过触摸辨认物体形态属于触觉失认症'},
        {question:'李某,车祸致伤头部,入院时,呼之可睁眼,压眶时有躲避反应,不能准确回答医生的问题,不清楚自己身在何处,该患者GCS评分为',options:['10分','11分','12分','13分'],answer:1,analysis:'呼之可睁眼（3分）+ 压眶躲避（4分）+ 不能准确回答问题（4分）= 11分'},
        {type:'multi',question:'意识障碍包括',options:['嗜睡','昏睡','昏迷','抽搐'],answers:[0,1,2],analysis:'意识障碍包括嗜睡、昏睡、昏迷，抽搐不属于意识障碍'},
        {type:'multi',question:'用GCS判定脑损害的严重程度是根据下列方面中的',options:['睁眼情况','感觉功能','肢体运动','言语表达'],answers:[0,2,3],analysis:'GCS评分包括睁眼反应、运动反应和言语反应三个方面'},
        {question:'不属于脑卒中临床表现的是',options:['意识障碍','头痛、头晕','偏瘫','截瘫','失语'],answer:3,analysis:'截瘫是脊髓损伤的表现，脑卒中表现为偏瘫'},
        {question:'患者有突然剧烈的头疼、呕吐,同时有脑膜刺激征,轻度意识障碍,则该患者高度怀疑为',options:['脑血栓形成','脑出血','蛛网膜下腔出血','脑梗塞'],answer:2,analysis:'蛛网膜下腔出血典型表现为突然剧烈头痛、呕吐、脑膜刺激征阳性'},
        {question:'划圈步态发生的原因是',options:['髋、膝、踝协同性伸展','髋、膝、踝协同性屈曲','髋关节伸展','膝、踝协同性伸展','疼痛造成的'],answer:0,analysis:'偏瘫患者划圈步态是由于患侧下肢伸肌痉挛，髋、膝、踝协同性伸展所致'},

        {question:'患者的肌张力逐渐恢复,并出现精细运动,属于Brunnstrom6阶段的哪一期',options:['I期','II期','IV期','V期'],answer:3,analysis:'Brunnstrom V期患者肌张力逐渐恢复，出现分离运动和精细运动'}

    routing_switching_final:{name:'路由交换期末复习题库',questions:[
        {question:'【单选题】链路聚合在实现以太通道时，不是限制条件的是()。',options:['A. 以太通道工作组成员端口配置必须一致','B. 必须由8个配置兼容的以太网端口组成','C. 聚合端口的配置将影响所有物理接口','D. 不能混用接口类型'],answer:1,analysis:'链路聚合要求成员端口配置一致、不能混用接口类型，且聚合端口配置会影响所有物理接口。但并不要求必须由8个端口组成，可以是2-8个端口。'},
        {question:'【单选题】如果目标设备位于其他网络，则源设备会在ARP缓存表中查找的信息是()。',options:['A. 网关的MAC地址','B. 目标的IP地址','C. 目标的MAC地址','D. 网关的IP地址'],answer:0,analysis:'当目标设备位于其他网络时，源设备需要将数据包发送给默认网关，因此会在ARP缓存表中查找网关的MAC地址。'},
        {question:'【单选题】当数据包与ACL的某项规则匹配了之后，路由器会()。',options:['A. 对数据包做出应答','B. 再用这个ACL中的其他控制规则来进行匹配','C. 丢弃数据包','D. 路由器就会执行这个控制规则中的行为'],answer:3,analysis:'ACL采用自上而下的匹配方式，一旦数据包与某条规则匹配，路由器立即执行该规则中的动作（允许或拒绝），不再继续匹配后续规则。'},
        {question:'【单选题】在配置了网关冗余的局域网中，响应针对网关的ARP应答中的MAC地址是()。',options:['A. 备份路由器响应虚拟MAC地址','B. 备份路由器响应自己的MAC地址','C. 活跃路由器响应自己的MAC地址','D. 活跃路由器响应虚拟的MAC地址'],answer:3,analysis:'在VRRP等网关冗余协议中，活跃路由器（Master）负责响应ARP请求，但响应的是虚拟路由器的MAC地址，而非自己的真实MAC地址。'},
        {question:'【单选题】路由器是根据什么信息转发数据包()。',options:['A. 目的MAC地址','B. 源IP地址','C. 目的IP地址','D. 源MAC地址'],answer:2,analysis:'路由器工作在网络层（第三层），根据数据包的目的IP地址查找路由表进行转发决策。'},
        {question:'【单选题】显示NAT转换信息的命令是()。',options:['A. [RA]dis nat all','B. [RA]dis nat vlan all','C. [RA]dis session all','D. [RA]dis nat session all'],answer:3,analysis:'在华为设备上，使用dis nat session all命令可以查看NAT转换的具体会话信息。'},
        {question:'【单选题】属于链路状态路由协议的是()。',options:['A. RIPv2','B. EIGRP','C. RIPv1','D. OSPF'],answer:3,analysis:'OSPF（开放最短路径优先）是典型的链路状态路由协议。RIP是距离矢量协议，EIGRP是高级距离矢量协议。'},

        {question:'【单选题】三类LSA报文中的Advertising Router字段是()。',options:['A. 自治系统边界路由器的ID','B. 非骨干路由器的ID','C. ABR的Router ID','D. 骨干路由器的ID'],answer:2,analysis:'三类LSA（网络汇总LSA）由ABR（区域边界路由器）产生，Advertising Router字段填写的是ABR的Router ID。'},

        {question:'【单选题】NAT一般部署在()。',options:['A. 主机的网关上','B. 连接内网和外网的网关设备','C. 任意设备','D. 服务器的网关上'],answer:1,analysis:'NAT通常部署在连接内部网络和外部网络的边界路由器或防火墙上，实现私网地址到公网地址的转换。'},

        {type:'multi',question:'【多选题】ACL的作用是()。',options:['A. 防止网络攻击','B. 降低网络性能','C. 限制网络流量','D. 可以实现对网络访问行为的控制'],answers:[0,2,3],analysis:'ACL可以过滤非法流量防止攻击、限制网络流量、控制网络访问行为。降低网络性能不是ACL的作用，而是其可能的副作用。'},
        {type:'multi',question:'【多选题】以下关于SVI技术描述正确的是()。',options:['A. 在三层交换机上配置VLAN的虚拟接口','B. 需要给每个VLAN配置一个VLAN虚拟接口','C. 给每个VLAN虚拟接口配置一个IP地址','D. 用户设置的默认网关就是三层交换机中VLAN虚拟接口端口号'],answers:[0,1,2],analysis:'SVI需要为每个VLAN创建虚拟接口并配置IP地址作为网关。选项D错误，网关是VLAN虚拟接口的IP地址，不是端口号。'},
        {type:'multi',question:'【多选题】下列哪些属于路由表的特点()。',options:['A. 每个路由器会根据自己的路由表中的信息单独做出决定','B. 路由表记录的全程的路径地址','C. 路由表记录的是到达目的网络的网络号，而非目的主机的IP地址','D. 关于一条路径的路由信息并不会提供返程的路由信息'],answers:[0,2,3],analysis:'路由表是每台路由器独立维护的，记录的是目的网络号而非全程路径，且路由信息是单向的，不提供返程路由。'},
        {type:'multi',question:'【多选题】下列创建NAT地址池正确的命令是()。',options:['A. [RA]ip nat address-group 1 200.10.10.1 200.10.10.10','B. [RA]nat address-group 200.10.10.1 200.10.10.100','C. [RA]nat address-group 200.10.10.1 200.10.10.10','D. [RA] address-group 1 200.10.10.1 200.10.10.10'],answers:[1,2],analysis:'华为设备创建NAT地址池的正确命令格式是nat address-group 起始IP 结束IP，不需要加ip前缀。'},
        {type:'multi',question:'【多选题】运行OSPF的路由器同步的链路状态信息包括()。',options:['A. 路由表信息','B. 链路的类型','C. 接口IP地址及掩码','D. 链路的开销'],answers:[1,2,3],analysis:'OSPF同步的是链路状态信息，包括链路类型、接口IP地址及掩码、链路开销等，不包括路由表信息。'},
        {type:'multi',question:'【多选题】属于内部网关路由协议的是()。',options:['A. OSPF','B. RIPv2','C. RIPv1','D. BGP'],answers:[0,1,2],analysis:'OSPF、RIPv2、RIPv1都是内部网关协议（IGP），用于自治系统内部路由。BGP是外部网关协议（EGP）。'},
        {type:'multi',question:'【多选题】下列属于静态路由特点的是()。',options:['A. 拓扑发生变化时，管理员必须手动调整','B. 适合小型非冗余网络','C. 静态路由必须手动配置','D. 发现远程网络'],answers:[0,1,2],analysis:'静态路由需要手动配置，拓扑变化时需手动调整，适合小型网络。它不能自动发现远程网络，这是动态路由的功能。'},
        {type:'multi',question:'【多选题】交换机对帧的转发操作行为包括()。',options:['A. 响应','B. 泛洪','C. 转发','D. 丢弃'],answers:[1,2,3],analysis:'交换机对帧的三种基本操作是：泛洪（目的MAC未知）、转发（目的MAC已知）、丢弃（错误帧或安全过滤）。'},
        {type:'multi',question:'【多选题】属于动态路由特点的是()。',options:['A. 在网络发生变化的时候，及时更新','B. 发送和接收路由更新消息','C. 适合网络规模小的环境','D. 发现和学习远端未知网络'],answers:[0,1,3],analysis:'动态路由能自动适应网络变化、交换路由信息、发现远程网络，适合大中型网络，而非小型网络。'},
        {type:'multi',question:'【多选题】OSPF中三类LSA的传递规则是()。',options:['A. ABR设备至少有一个接口属于骨干区域','B. ABR设备所有接口属于骨干区域','C. 骨干区域ID固定为0','D. 从骨干区域传来的三类LSA不再传回骨干区域'],answers:[0,2,3],analysis:'ABR至少有一个接口属于骨干区域（Area 0），骨干区域ID固定为0，且从骨干区域传来的三类LSA不会传回骨干区域。'},
        {type:'multi',question:'【多选题】二层网络的环路带来的问题包括()。',options:['A. MAC地址表震荡','B. 阻塞主机的流量','C. 重复数据帧','D. 广播风暴'],answers:[0,2,3],analysis:'二层环路会导致MAC地址表震荡、重复数据帧、广播风暴等问题，但不会直接阻塞主机流量。'},
        {type:'multi',question:'【多选题】VRRP备用路由器的功能是()。',options:['A. 在活跃路由器发生故障时快速承担转发数据包的责任','B. 监控VRRP组的运行状况','C. 转发数据包','D. 响应针对虚拟IP的ARP请求'],answers:[0,1],analysis:'VRRP备份路由器监控活跃路由器状态，在其故障时接管转发责任，但平时不转发数据包也不响应ARP请求。'},
        {type:'multi',question:'【多选题】交换机MAC地址表包含()。',options:['A. 接口号码','B. MAC地址','C. 主机号','D. IP地址'],answers:[0,1],analysis:'MAC地址表存储的是MAC地址与交换机端口（接口号码）的映射关系，不包含IP地址。'},
        {type:'multi',question:'【多选题】链路状态路由协议OSPF的特点是()。',options:['A. 支持定期更新','B. 适用于大中型网络','C. 可以提供认证功能','D. 支持区域的划分'],answers:[1,2,3],analysis:'OSPF是触发式更新而非定期更新，适用于大中型网络，支持认证和区域划分以提高可扩展性。'},
        {type:'multi',question:'【多选题】链路聚合的优点是()。',options:['A. 配置任务在链路聚合的虚拟端口完成，确保链路中的配置一致','B. 链路聚合无法提供冗余','C. 链路聚合创建的汇聚被视为一个逻辑链路','D. 链路聚合依赖于现有的交换机端口，无需将链路升级就能拥有更高带宽'],answers:[0,2,3],analysis:'链路聚合提供冗余（B错误），将多条物理链路汇聚为一条逻辑链路，可在不升级硬件的情况下增加带宽。'},
        {type:'multi',question:'【多选题】OSPF协议的工作原理是()。',options:['A. 同步路由表','B. 同步链路状态数据库','C. 计算最优路由','D. 邻居建立'],answers:[1,2,3],analysis:'OSPF的工作原理包括：建立邻居关系、同步链路状态数据库、使用SPF算法计算最优路由。它同步的是LSDB而非路由表。'},
        {type:'multi',question:'【多选题】HELLO报文的作用是()。',options:['A. 邻居建立','B. 同步邻居间的路由表','C. 同步邻居间的拓扑表','D. 邻居发现'],answers:[0,3],analysis:'HELLO报文用于发现邻居和建立/维护邻居关系，不用于同步路由表或拓扑表。'},
        {question:'【判断题】OSPF协议通过Hello报文可以让互联的路由器间自动发现并建立邻居关系。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。OSPF路由器通过周期性发送Hello报文来发现邻居并建立和维护邻居关系。'},
        {question:'【判断题】当需要网络中的所有主机都能接收到相同的信息并进行处理的情况下，通常会使用组播方式。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。需要所有主机接收时应使用广播方式，组播是向特定组成员发送数据。'},
        {question:'【判断题】冗余链路虽然增强了网络的可靠性，但是也会产生环路，导致通信质量下降等问题。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。冗余链路提供备份路径增强可靠性，但二层网络中会产生环路，需要STP等协议来解决。'},
        {question:'【判断题】区域内部路由器维护本区域内的链路状态信息并计算区域内的最优路径。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。区域内部路由器只维护本区域的LSDB，使用SPF算法计算区域内的最优路径。'},
        {question:'【判断题】三层交换机需要为每个VLAN创建一个SVI。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。三层交换机要实现VLAN间路由，需要为每个VLAN创建对应的SVI（VLANIF接口）并配置IP地址。'},
        {question:'【判断题】在三层交换机的物理端口配置IP地址作为网关，可以实现VLAN间路由。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。三层交换机的物理端口是二层端口，不能直接配置IP地址。应使用SVI（VLANIF接口）作为网关。'},
        {question:'【判断题】两个或多个路由器可以使用自己的真实IP地址作为虚拟路由器的IP地址。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。虚拟路由器的IP地址是一个虚拟地址，不能是任何一台物理路由器的真实IP地址。'},
        {question:'【判断题】静态路由可以与动态路由协议结合使用。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。静态路由和动态路由可以同时配置，常用于补充动态路由无法覆盖的特殊路径。'},
        {question:'【判断题】交换机把从某一端口进来的帧通过自己所有端口转发出去。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。交换机只在目的MAC地址未知（泛洪）或收到广播/组播时才从所有端口转发，单播帧只从对应端口转发。'},
        {question:'【判断题】NAT技术只能将一个私网用户对应转换为一个公网地址。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。NAT有多种方式：静态NAT是一对一，NAPT/PAT可以多对一，动态NAT使用地址池。'},
        {question:'【判断题】VRRP中默认是所有路由器争抢成为活跃路由器。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。VRRP中优先级最高的路由器成为活跃路由器，其他作为备份，不是所有路由器都争抢。'},
        {question:'【判断题】指定端口的选举中，如果累计路径开销相同，则比较端口所在交换机的端口ID。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。指定端口选举中，路径开销相同时比较的是上游交换机的Bridge ID，而非端口ID。'},
        {question:'【判断题】ACL可以通过定义规则来拒绝流量的通过，但不能允许流量通过。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。ACL既可以定义permit（允许）规则，也可以定义deny（拒绝）规则。'},
        {question:'【判断题】指定端口的选举也是首先比较累计路径开销。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。指定端口的选举首先比较累计路径开销，开销最小的端口成为指定端口。'},
        {question:'【判断题】路由器工作在数据链路层。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。路由器工作在网络层（第三层），根据IP地址进行路由决策。交换机工作在数据链路层。'},
        {question:'【判断题】OSPF的每个区域内的设备需同步所有区域内的链路状态数据库。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。OSPF区域内的设备只需同步本区域的LSDB，不需要同步所有区域的数据库。'},
        {question:'【判断题】链路聚合技术，让STP允许设备之间存在冗余链路，而且不会阻塞这些链路。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。链路聚合将多条物理链路捆绑为一条逻辑链路，STP将其视为单条链路，不会阻塞冗余的物理链路。'},
        {question:'【判断题】OSPF邻居关系建立后，不需要再发送Hello报文。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。OSPF需要周期性发送Hello报文来维护邻居关系，超时未收到Hello报文则认为邻居失效。'},
        {question:'【判断题】RIPv1不支持VLSM和CIDR。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。RIPv1是有类路由协议，在路由更新中不传递子网掩码，因此不支持VLSM和CIDR。'},
        {question:'【判断题】一个以太网接口只能加入到一个EtherChannel接口。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。一个物理以太网接口只能属于一个以太通道（EtherChannel/Eth-Trunk），不能同时加入多个。'},
        {question:'【判断题】区域内部路由器作为区域间通信的桥梁，同时维护所连接多个区域的链路状态数据库。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。这是ABR（区域边界路由器）的功能，区域内部路由器只维护单一区域的LSDB。'},
        {question:'【判断题】RIP属于距离矢量路由协议。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。RIP（路由信息协议）是典型的距离矢量路由协议，使用跳数作为度量值。'},
        {question:'【判断题】OSPF路由器同步的是路由信息。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。OSPF同步的是链路状态信息（LSA），而非路由信息。路由器独立使用SPF算法计算路由。'},
        {question:'【判断题】ACL 可以过滤路由器自身产生的数据包。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。ACL只能过滤穿越路由器的数据包，不能过滤路由器自身产生的数据包（如路由协议报文）。'},
        {question:'【判断题】交换机中有一个MAC地址表，里面存放了MAC地址与交换机端口的映射关系。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。交换机通过学习源MAC地址，建立MAC地址与端口的映射关系，存储在MAC地址表中。'},
        {question:'【判断题】OSPF区域内部的路由器使用SPF算法保证了区域内部的无环路。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。OSPF使用SPF（最短路径优先）算法计算路由，该算法基于拓扑图计算最短路径，保证无环路。'},
        {question:'【判断题】OSPF协议中，各路由器基于链路状态信息独立计算路由。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。OSPF是链路状态协议，每台路由器独立维护LSDB并使用SPF算法计算最优路径。'},
        {question:'【判断题】SVI就是把工作在第2层交换机端口转换为第3层接口。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。SVI是VLAN的虚拟三层接口，并非将物理二层端口转换为三层接口。'},
        {question:'【判断题】NAT 允许维持现有的私有IPv4地址方案，同时能够很容易地更换为新的公有编址方案。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。NAT技术使私网可以继续使用私有地址，同时通过地址转换访问公网，便于编址方案的迁移。'},
        {question:'【判断题】当网络里面的状态发生改变的时候，就能通过动态路由协议及时的发现并进行更新。',options:['A. 正确','B. 错误'],answer:0,analysis:'正确。动态路由协议能够自动感知网络拓扑变化并重新计算路由，实现快速收敛。'},
        {question:'【判断题】因为STP的缘故，聚合链路中只能有一个物理链路处于活动状态。',options:['A. 正确','B. 错误'],answer:1,analysis:'错误。链路聚合将多条物理链路捆绑为一条逻辑链路，STP将其视为单条链路，所有聚合的物理链路都可以处于活动状态。'}
    ]},

        {question:'请选择「exceedingly」的中文意思',options:["非常；极其", "正式申请，书面申请", "（尤指马戏团的）小丑", "方法；接近"],answer:0},
        {question:'请选择「harmonious」的中文意思',options:["习惯，风俗", "和睦的；融洽的", "罐头；罐；听（也作 tin can）", "认识；领悟"],answer:1},
        {question:'请选择「sorrow」的中文意思',options:["令人愉快的；有乐趣的", "悲伤；悲痛", "n. 电缆", "vt. 表达；传送，运送"],answer:1},
        {question:'请选择「somewhat」的中文意思',options:["现实", "出发；启程", "稍微；有点", "发生故障，损坏"],answer:2},
        {question:'请选择「forehead」的中文意思',options:["前额", "脚踝", "a. （人） 言谈条理清楚的", "影响；使产生"],answer:0},
        {question:'请选择「concentration」的中文意思',options:["vt. 获得", "专注；专心", "乘客，旅客", "vt. / n. 遭遇，经历，遇到"],answer:1},
        {question:'请选择「circus」的中文意思',options:["马戏团", "描述；形容", "环境；周围的事物", "（使）移动，（使）转移"],answer:0},
        {question:'请选择「clown」的中文意思',options:["（使）移动，（使）转移", "节约的", "（尤指马戏团的）小丑", "n. 美术馆，画廊；楼座"],answer:2},
        {question:'请选择「tremendous」的中文意思',options:["谨慎的，小心的", "n. 柜台", "巨大的；重大的；强烈的", "开支（额）；支出（额）"],answer:2},
        {question:'请选择「precious」的中文意思',options:["宝贝（对所爱之人，尤指婴儿或小孩的称呼）", "无知；愚昧", "抓住，捉住；", "织物；衣料"],answer:0},
        {question:'请选择「expenditure」的中文意思',options:["开支（额）；支出（额）", "投资；投入（时间或精力）", "a. 广大的，巨大的", "vt. 侵犯；亵渎；违反"],answer:0},

function fp(){let s=[navigator.userAgent,navigator.language,screen.colorDepth,screen.width+'x'+screen.height,new Date().getTimezoneOffset()].join('|');let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h=h&0x7FFFFFFF;}return'fp_'+Math.abs(h).toString(16)}
function t(m,e){let d=document.createElement('div');d.className='toast '+(e?'err':'ok');d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),3000)}
function esc(s){let d=document.createElement('div');d.textContent=s;return d.innerHTML}
function renderQText(s){
    let lines=String(s).split('\n'),out='',i=0;
    while(i<lines.length){
        if(lines[i].indexOf('|')!==-1&&i+1<lines.length&&lines[i+1].indexOf('|')!==-1){
            let rows=[];while(i<lines.length&&lines[i].indexOf('|')!==-1){rows.push(lines[i].split('|').map(c=>c.trim()));i++}
            out+='<table style="border-collapse:collapse;margin:8px 0;font-size:15px;">';
            rows.forEach((r,ri)=>{let tag=ri===0?'th':'td',bg=ri===0?'background:#eef2ff;':'';out+='<tr>'+r.map(c=>`<${tag} style="border:1px solid #cbd5e1;padding:6px 12px;text-align:left;${bg}">${esc(c)}</${tag}>`).join('')+'</tr>'});
            out+='</table>';
        }else{out+=esc(lines[i])+'\n';i++}
    }
    return out.replace(/\n$/,'');
}
function shuffle(a){let r=a.slice();for(let i=r.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function shuffleBank(questions){
    return shuffle(questions).map(q=>{
        if(q.type==='text')return {type:'text',question:q.question,answer:q.answer,analysis:q.analysis};
        if(q.type==='multi'){
            let idx=q.options.map((_,i)=>i),shuf=shuffle(idx);
            return {type:'multi',question:q.question,options:shuf.map(i=>q.options[i]),answers:q.answers.map(a=>shuf.indexOf(a)),analysis:remapAnalysis(q.analysis,shuf)};
        }
        let idx=q.options.map((_,i)=>i),shuf=shuffle(idx);
        return {question:q.question,options:shuf.map(i=>q.options[i]),answer:shuf.indexOf(q.answer),analysis:remapAnalysis(q.analysis,shuf)};
    });
}
function remapAnalysis(analysis,shuf){
    if(!analysis)return analysis;
    let lbs=['A','B','C','D','E','F'],map={};
    for(let i=0;i<shuf.length;i++)map[lbs[i]]=lbs[shuf.indexOf(i)];
    return analysis.replace(/(?<![A-Za-z0-9])[A-F](?![A-Za-z0-9])/g,m=>map[m]||m);
}

function updateExamStats(){
    let answered=es.answers.filter(a=>a!==null).length;
    let correct=0;
    es.questions.forEach((q,i)=>{
        let a=es.answers[i];
        if(a===null)return;
        let ok=q.type==='multi'?(a||[]).slice().sort().join(',')===(q.answers||[]).slice().sort().join(','):q.type==='text'?normalizeSQL(a)===normalizeSQL(q.answer):a===q.answer;
        if(ok)correct++;
    });
    let wrong=answered-correct;
    let acc=answered>0?Math.round((correct/answered)*100):0;
    document.getElementById('exam-correct').textContent=correct;
    document.getElementById('exam-wrong').textContent=wrong;
    document.getElementById('exam-acc').textContent=acc+'%';
}

async function genKey(){
    let ck=document.getElementById('ckey').value.trim();
    let bidRaw=document.getElementById('cbid').value;
    let bid=String(bidRaw||'').replace(/\s+/g,'').toUpperCase();
    let rm=document.getElementById('kremark').value.trim();
    let bids=[];
    document.querySelectorAll('#bank-dd-pn .bdd-it.sel').forEach(el=>bids.push(el.dataset.id));
    if(!bid){t('请输入要绑定的浏览器ID',true);document.getElementById('cbid').focus();return}
    if(!/^[A-Z0-9_]{3,64}$/.test(bid)){t('浏览器ID格式不合法（仅允许字母、数字、下划线，3-64位）：'+bid,true);return}
    if(bids.length===0){t('请至少绑定一个试题库',true);return}
    let ks=getKeys();
    if(ks.some(k=>k.browserId===bid)){t('该浏览器ID已绑定其他密钥',true);return}
    let bankId=bids.join(',');
    try{
        let r=await fetch(API+'/generate-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bankId:bankId,customKey:ck||null,adminToken:ADM,remark:rm,browserId:bid})});
        let d=await r.json();
        if(d.success){
            ks.push({key:d.key,remark:rm||'',banks:bids,browserId:d.browserId||bid,createdAt:new Date().toLocaleString()});
            saveKeys(ks);
            document.getElementById('ckey').value='';document.getElementById('cbid').value='';document.getElementById('kremark').value='';
            document.querySelectorAll('#bank-dd-pn .bdd-it.sel').forEach(el=>el.classList.remove('sel'));
            renderBankDD();
            renderKeys();t('密钥生成成功');
        }else{t(d.error,true)}
    }catch(e){t('生成失败，请检查网络',true)}
}

function renderKeys(){
    let ks=getKeys(),c=document.getElementById('klist');
    if(ks.length===0){c.innerHTML='<p style="color:#64748b;text-align:center;padding:20px;">暂无密钥</p>';return}
    let h='';
    ks.forEach((k,i)=>{
        let rm=k.remark?`<span style="color:#a78bfa;font-weight:500;">[${k.remark}]</span> `:'';
        let shortKey=k.key.split('.')[0] || k.key;
        let btags='';
        if(k.banks&&k.banks.length){k.banks.forEach(bid=>{let bn=BANKS[bid];if(bn)btags+=`<span class="btile">${esc(bn.name)}</span>`})}
        h+=`<div class="key-item">
            <div>
                <div class="key-val" style="cursor:pointer" title="点击复制完整密钥" onclick="copyKey('${k.key.replace(/'/g,"\\'")}')">${rm}${shortKey} <span style="font-size:11px;color:#64748b;">📋复制</span></div>
                ${btags?`<div style="margin-top:6px;">${btags}</div>`:''}

            </div>

                <button class="btn-xs btn-r" onclick="delKey(${i})">删除</button>

    });

}

function copyKey(key){
    navigator.clipboard.writeText(key).then(()=>t('密钥已复制到剪贴板！')).catch(()=>{
        let ta=document.createElement('textarea');ta.value=key;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);t('密钥已复制！');
    });

function delKey(i){
    if(!confirm('确定删除此密钥？删除后该密钥将无法再次使用。'))return;
    let ks=getKeys(),rec=ks[i];
    if(rec&&rec.key){
        let rev=JSON.parse(localStorage.getItem('qbank_revoked')||'[]');
        let rawKey=rec.key.split('.')[0];
        if(rev.indexOf(rawKey)===-1)rev.push(rawKey);
        localStorage.setItem('qbank_revoked',JSON.stringify(rev));
        if(rec.browserId){
            let bidRev=JSON.parse(localStorage.getItem('qbank_revoked_bid')||'{}');
            bidRev[rec.browserId]=(bidRev[rec.browserId]||[]).concat([rawKey]);
            localStorage.setItem('qbank_revoked_bid',JSON.stringify(bidRev));
        }
    }
    ks.splice(i,1);saveKeys(ks);renderKeys();t('密钥已删除并加入撤销列表');
}

function isRevoked(key){
    let rev=JSON.parse(localStorage.getItem('qbank_revoked')||'[]');
    let raw=String(key||'').split('.')[0];
    return rev.indexOf(raw)!==-1;
}

async function unlock(){
    let k=document.getElementById('user-key').value.trim();
    let e=document.getElementById('user-err');e.textContent='';

    let curBid=(localStorage.getItem('browser_id')||'').toUpperCase();
    if(!curBid){e.textContent='浏览器ID未初始化，请刷新页面';return}
    try{

        let d=await r.json();
        if(d.verified){
            localStorage.setItem('qbank_bind','1');
            localStorage.setItem('qbank_key',k);
            localStorage.setItem('qbank_banks',d.bankId||'');
            localStorage.setItem('qbank_bid',d.browserId||curBid);
            showExam(d.bankId);
        }else{e.textContent=d.error||'密钥无效'}

async function checkSession(){
    let bound=localStorage.getItem('qbank_bind');
    if(!bound)return;
    let k=localStorage.getItem('qbank_key');
    if(!k)return;
    let curBid=(localStorage.getItem('browser_id')||'').toUpperCase();
    let savedBid=(localStorage.getItem('qbank_bid')||'').toUpperCase();
    if(isRevoked(k)){
        clearSession();
        document.getElementById('user-err').textContent='此密钥已被管理员撤销';
        return;
    }
    if(savedBid&&savedBid!==curBid){
        clearSession();
        document.getElementById('user-err').textContent='检测到设备变更，请重新输入密钥';
        return;
    }
    try{
        let r=await fetch(API+'/verify-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k,browserId:curBid})});
        let d=await r.json();
        if(d.verified){showExam(d.bankId);t('欢迎回来！已自动登录')}
        else{
            clearSession();
            document.getElementById('user-err').textContent=d.error||'会话已过期，请重新输入密钥';
        }
    }catch(e){}
}
function clearSession(){
    localStorage.removeItem('qbank_bind');
    localStorage.removeItem('qbank_key');
    localStorage.removeItem('qbank_fp');
    localStorage.removeItem('qbank_banks');
    localStorage.removeItem('qbank_bid');
}

function showResult(){
    document.getElementById('parea').style.display='none';document.getElementById('pres').style.display='block';
    let total=ps.questions.length,correct=ps.correctCount,pct=Math.round((correct/total)*100);
    let wrongCount=total-correct;
    if(wrongCount>0){
        let wrongList=[];
        ps.questions.forEach((q,i)=>{
            let a=ps.answers[i];
            if(a===null)return;
            let ok=q.type==='multi'?(a||[]).slice().sort().join(',')===(q.answers||[]).slice().sort().join(','):q.type==='text'?normalizeSQL(a)===normalizeSQL(q.answer):a===q.answer;
            if(!ok)wrongList.push({...q,userAnswer:a,bankId:ps.bankId,bankName:BANKS[ps.bankId]?BANKS[ps.bankId].name:'',timestamp:Date.now()});
        });
        if(wrongList.length>0)saveWrongBook(wrongList);
    }
    document.getElementById('rem').textContent=pct>=90?'🏆':pct>=80?'🎉':pct>=60?'👍':'💪';
    let s=document.getElementById('rsc');s.textContent=pct+'%';s.style.color=pct>=80?'#34d399':pct>=60?'#fbbf24':'#f87171';
    document.getElementById('rdt').textContent=`共 ${total} 题 | 正确 ${correct} 题 | 错误 ${wrongCount} 题`;
    document.getElementById('pbtns').innerHTML=`<button class="btn btn-p" onclick="restartPractice()" style="max-width:200px">重新练习</button>${wrongCount>0?`<button class="btn" onclick="retryWrongPractice()" style="max-width:200px;background:#faad14;color:#fff;">错题重练 (${wrongCount}题)</button>`:''}<button class="btn btn-s" onclick="changeBank()" style="max-width:200px">切换题库</button>`;
}
function retryWrongPractice(){
    let wrong=[];
    ps.questions.forEach((q,i)=>{
        let a=ps.answers[i];
        if(a===null)return;
        let ok=q.type==='multi'?(a||[]).slice().sort().join(',')===(q.answers||[]).slice().sort().join(','):q.type==='text'?normalizeSQL(a)===normalizeSQL(q.answer):a===q.answer;
        if(!ok)wrong.push(q);
    });
    if(wrong.length===0){t('全部正确，没有错题！');return}
    let qs=shuffleBank(wrong);
    ps={bankId:ps.bankId,questions:qs,currentIndex:0,answers:new Array(qs.length).fill(null),correctCount:0};
    document.getElementById('pres').style.display='none';document.getElementById('parea').style.display='block';showQ();
}
function restartPractice(){
    let qs;
    if(ps.bankId==='wrong_book'){
        let book=getWrongBook();
        if(book.length===0){t('错题本已清空',true);changeBank();return}
        qs=shuffleBank(book.map(q=>({question:q.question,options:q.options,answer:q.answer,type:q.type,answers:q.answers,analysis:q.analysis})));
    }else{
        let bank=BANKS[ps.bankId];

    document.getElementById('pres').style.display='none';document.getElementById('parea').style.display='block';showQ();

}

            ad.innerHTML=`<div style="font-weight:600;font-size:18px;margin-bottom:10px;color:${ok?'#34d399':'#f87171'};">${ok?'🎉 回答正确！':'❌ 回答错误'}</div><div style="line-height:1.6;color:#e2e8f0;"><strong>正确答案：</strong><div class="ta-ans">${esc(q.answer)}</div>${q.analysis?`<br><strong>解析：</strong>${q.analysis}`:''}</div>`;
        }else{
            ok=prevAns===q.answer;
            ad.style.background=ok?'rgba(52,211,153,.1)':'rgba(248,113,113,.1)';ad.style.border=ok?'1px solid #34d399':'1px solid #f87171';
            ad.innerHTML=`<div style="font-weight:600;font-size:18px;margin-bottom:10px;color:${ok?'#34d399':'#f87171'};">${ok?'🎉 回答正确！':'❌ 回答错误'}</div><div style="line-height:1.6;color:#e2e8f0;">正确答案是 <strong style="color:#34d399;">${lbs[q.answer]}</strong>。${q.analysis?`<br><br><strong>解析：</strong>${q.analysis}`:''}</div>`;
        }
        ad.style.display='block';
        nd.innerHTML=es.currentIndex<es.questions.length-1?'<button onclick="nextExamQ()" style="padding:12px 40px;background:linear-gradient(135deg,#818cf8 0%,#a78bfa 50%,#c084fc 100%);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">下一题</button>':'<button onclick="showExamResult()" style="padding:12px 40px;background:linear-gradient(135deg,#818cf8 0%,#a78bfa 50%,#c084fc 100%);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">查看结果</button>';
        nd.style.display='block';
    }else{ad.style.display='none';nd.style.display='none'}
}
function submitExamText(){
    let q=es.questions[es.currentIndex];
    let ta=document.getElementById('exam-ta-'+es.currentIndex);
    if(!ta)return;
    let ans=ta.value.trim();
    if(!ans){t('请输入答案',true);return}
    let ok=normalizeSQL(ans)===normalizeSQL(q.answer);
    es.answers[es.currentIndex]=ans;
    if(ok)es.correctCount++;
    showExamQ();
    updateExamStats();
    if(ok){
        if(es.currentIndex<es.questions.length-1)setTimeout(()=>{es.currentIndex++;showExamQ()},500);
        else setTimeout(()=>showExamResult(),500);
    }
}
function normalizeSQL(s){
    return String(s||'').replace(/'/g,'').replace(/\s+/g,' ').replace(/\s*([,;()=<>])\s*/g,'$1').replace(/;/g,'').trim().toLowerCase();
}
function toggleExamMulti(idx){
    let d=document.querySelector(`#exam-o div[data-multi="${idx}"]`);
    if(d&&!d.classList.contains('om-sel'))d.classList.add('om-sel');else if(d)d.classList.remove('om-sel');
}
function submitExamMulti(){
    let q=es.questions[es.currentIndex];
    let divs=document.querySelectorAll('#exam-o div[data-multi]');
    let sel=[];divs.forEach(d=>{if(d.classList.contains('om-sel'))sel.push(parseInt(d.dataset.multi))});
    if(sel.length===0){t('请至少选择一个选项',true);return}
    let ok=sel.slice().sort().join(',')===(q.answers||[]).slice().sort().join(',');
    es.answers[es.currentIndex]=sel;
    if(ok)es.correctCount++;
    showExamQ();
    updateExamStats();
    if(ok){
        if(es.currentIndex<es.questions.length-1)setTimeout(()=>{es.currentIndex++;showExamQ()},500);
        else setTimeout(()=>showExamResult(),500);
    }
}
function selExam(idx){
    let q=es.questions[es.currentIndex];
    es.answers[es.currentIndex]=idx;
    let ok=idx===q.answer;
    if(ok)es.correctCount++;
    showExamQ();
    updateExamStats();
    if(ok){
        if(es.currentIndex<es.questions.length-1)setTimeout(()=>{es.currentIndex++;showExamQ()},500);
        else setTimeout(()=>showExamResult(),500);
    }
}
function nextExamQ(){es.currentIndex++;showExamQ()}
function prevExamQ(){if(es.currentIndex>0){es.currentIndex--;showExamQ()}}
function showExamResult(){
    document.getElementById('exam-qarea').style.display='none';document.getElementById('exam-res').style.display='block';
    let total=es.questions.length,correct=es.correctCount,pct=Math.round((correct/total)*100);
    let wrongCount=total-correct;
    if(wrongCount>0){
        let wrongList=[];
        es.questions.forEach((q,i)=>{
            let a=es.answers[i];
            if(a===null)return;
            let ok=q.type==='multi'?(a||[]).slice().sort().join(',')===(q.answers||[]).slice().sort().join(','):q.type==='text'?normalizeSQL(a)===normalizeSQL(q.answer):a===q.answer;
            if(!ok)wrongList.push({...q,userAnswer:a,bankId:es.bankId,bankName:BANKS[es.bankId]?BANKS[es.bankId].name:'',timestamp:Date.now()});
        });
        if(wrongList.length>0)saveWrongBook(wrongList);
    }
    document.getElementById('exam-res').innerHTML=`<div style="font-size:80px;margin-bottom:20px;">${pct>=90?'🏆':pct>=80?'🎉':pct>=60?'👍':'💪'}</div><div style="font-size:48px;font-weight:700;margin-bottom:15px;color:${pct>=80?'#34d399':pct>=60?'#fbbf24':'#f87171'};">${pct}%</div><div style="color:#94a3b8;font-size:16px;">共 ${total} 题 | 正确 ${correct} 题 | 错误 ${wrongCount} 题</div><div style="margin-top:30px;display:flex;gap:15px;justify-content:center;flex-wrap:wrap;"><button class="btn btn-p" onclick="restartExam()" style="max-width:200px">重新答题</button>${wrongCount>0?`<button class="btn" onclick="retryWrongExam()" style="max-width:200px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;">错题重练 (${wrongCount}题)</button>`:''}<button class="btn btn-s" onclick="logout()" style="max-width:200px">返回解锁</button></div>`;
}
function retryWrongExam(){
    let wrong=[];es.questions.forEach((q,i)=>{let a=es.answers[i];if(a===null)return;let ok=q.type==='multi'?(a||[]).slice().sort().join(',')===(q.answers||[]).slice().sort().join(','):q.type==='text'?normalizeSQL(a)===normalizeSQL(q.answer):a===q.answer;if(!ok)wrong.push(q)});
    if(wrong.length===0){t('全部正确，没有错题！');return}
    let qs=shuffleBank(wrong);es={bankId:es.bankId,questions:qs,currentIndex:0,answers:new Array(qs.length).fill(null),correctCount:0};
    document.getElementById('exam-res').style.display='none';document.getElementById('exam-qarea').style.display='block';showExamQ();
}
function restartExam(){
    let bank=BANKS[es.bankId];
    let qs=shuffleBank(bank.questions);
    es={bankId:es.bankId,questions:qs,currentIndex:0,answers:new Array(qs.length).fill(null),correctCount:0};
    document.getElementById('exam-res').style.display='none';
    document.getElementById('exam-qarea').style.display='block';
    showExamQ();
    updateExamStats();
}

function endExamEarly(){
    let total=es.questions.length;
    let answered=es.answers.filter(a=>a!==null).length;
    if(answered===0){t('您还没有答题，无法结束',true);return}
    let correct=0;
    let wrongList=[];
    es.questions.forEach((q,i)=>{
        let a=es.answers[i];
        if(a===null)return;
        let ok=q.type==='multi'?(a||[]).slice().sort().join(',')===(q.answers||[]).slice().sort().join(','):q.type==='text'?normalizeSQL(a)===normalizeSQL(q.answer):a===q.answer;
        if(ok)correct++;
        else wrongList.push({...q,userAnswer:a,bankId:es.bankId,bankName:BANKS[es.bankId]?BANKS[es.bankId].name:'',timestamp:Date.now()});
    });
    es.correctCount=correct;
    if(wrongList.length>0)saveWrongBook(wrongList);
    document.getElementById('exam-qarea').style.display='none';
    document.getElementById('exam-res').style.display='block';
    let pct=Math.round((correct/total)*100);
    let wrongCount=answered-correct;
    document.getElementById('exam-res').innerHTML=`<div style="font-size:80px;margin-bottom:20px;">${pct>=90?'🏆':pct>=80?'🎉':pct>=60?'👍':'💪'}</div><div style="font-size:48px;font-weight:700;margin-bottom:15px;color:${pct>=80?'#34d399':pct>=60?'#fbbf24':'#f87171'};">${pct}%</div><div style="color:#94a3b8;font-size:16px;margin-bottom:10px;">共 ${total} 题 | 已答 ${answered} 题 | 正确 ${correct} 题 | 错误 ${wrongCount} 题</div>${wrongCount>0?`<div style="color:#34d399;font-size:14px;margin-bottom:15px;">✓ 已自动保存 ${wrongCount} 道错题到错题本</div>`:''}<div style="color:#64748b;font-size:13px;margin-bottom:20px;">（本次提前结束答题）</div><div style="margin-top:30px;display:flex;gap:15px;justify-content:center;flex-wrap:wrap;"><button class="btn btn-p" onclick="restartExam()" style="max-width:200px">重新答题</button>${wrongCount>0?`<button class="btn" onclick="retryWrongExam()" style="max-width:200px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;">错题重练 (${wrongCount}题)</button>`:''}<button class="btn btn-s" onclick="logout()" style="max-width:200px">返回解锁</button></div>`;
}

function endPracticeEarly(){
    let total=ps.questions.length;
    let answered=ps.answers.filter(a=>a!==null).length;
    if(answered===0){t('您还没有答题，无法结束',true);return}
    let correct=0;
    let wrongList=[];
    ps.questions.forEach((q,i)=>{
        let a=ps.answers[i];
        if(a===null)return;
        let ok=q.type==='multi'?(a||[]).slice().sort().join(',')===(q.answers||[]).slice().sort().join(','):q.type==='text'?normalizeSQL(a)===normalizeSQL(q.answer):a===q.answer;
        if(ok)correct++;
        else wrongList.push({...q,userAnswer:a,bankId:ps.bankId,bankName:BANKS[ps.bankId]?BANKS[ps.bankId].name:'',timestamp:Date.now()});
    });
    ps.correctCount=correct;
    if(wrongList.length>0)saveWrongBook(wrongList);
    document.getElementById('parea').style.display='none';
    document.getElementById('pres').style.display='block';
    let pct=Math.round((correct/total)*100);
    let wrongCount=answered-correct;
    document.getElementById('rem').textContent=pct>=90?'🏆':pct>=80?'🎉':pct>=60?'👍':'💪';
    let s=document.getElementById('rsc');s.textContent=pct+'%';s.style.color=pct>=80?'#34d399':pct>=60?'#fbbf24':'#f87171';
    document.getElementById('rdt').innerHTML=`共 ${total} 题 | 已答 ${answered} 题 | 正确 ${correct} 题 | 错误 ${wrongCount} 题${wrongCount>0?`<br><span style="color:#34d399;font-size:14px;">✓ 已自动保存 ${wrongCount} 道错题到错题本</span>`:''}<br><span style="color:#64748b;font-size:13px;">（本次提前结束练习）</span>`;
    document.getElementById('pbtns').innerHTML=`<button class="btn btn-p" onclick="restartPractice()" style="max-width:200px">重新练习</button>${wrongCount>0?`<button class="btn" onclick="retryWrongPractice()" style="max-width:200px;background:#faad14;color:#fff;">错题重练 (${wrongCount}题)</button>`:''}<button class="btn btn-s" onclick="changeBank()" style="max-width:200px">切换题库</button>`;
}

window.onload=function(){
    initBrowserId();
    let am=document.getElementById('auto-msg');
    if(localStorage.getItem('admin_session')){if(am)am.style.display='none';enterAdmin();return}
    if(am){am.style.display='block';am.innerHTML='<span class="spin"></span>检测登录状态...'}
    checkSession().finally(()=>{if(am)am.style.display='none'});
};
function initBrowserId(){
    try{
        let id=localStorage.getItem('browser_id');
        if(!id||!/^[A-Z0-9_]{3,64}$/.test(id)){
            let raw=fp();
            id=String(raw).toUpperCase().replace(/[^A-Z0-9_]/g,'');
            if(id.length<3)id='BR_'+Math.random().toString(36).slice(2,10).toUpperCase();
            localStorage.setItem('browser_id',id);
        }
        let el=document.getElementById('bid-val');
        if(el)el.textContent=id;
    }catch(e){
        let el=document.getElementById('bid-val');
        if(el)el.textContent='BR_'+Math.random().toString(36).slice(2,10).toUpperCase();
    }
}
function copyBrowserId(){
    let id=document.getElementById('bid-val').textContent;
    navigator.clipboard.writeText(id).then(()=>t('浏览器ID已复制：'+id)).catch(()=>{
        let ta=document.createElement('textarea');ta.value=id;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);t('浏览器ID已复制');
    });
}
